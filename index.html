<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarpApps Pricing</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Babel Standalone untuk kompilasi JSX di browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50">
    <!-- Wadah aplikasi React -->
    <div id="root"></div>

    <!-- Script Utama Aplikasi -->
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useCallback } from 'https://esm.sh/react@18';
        import { createRoot } from 'https://esm.sh/react-dom@18/client';
        import { 
          Calculator, AlertCircle, TrendingUp, Package, Save, RefreshCw, 
          DollarSign, ChevronDown, ChevronUp, Search, Database, Info, Tag, 
          Lightbulb, CheckCircle2, Settings, Box, Users, LogOut, Lock, User, 
          HelpCircle, ArrowRight, Edit3, ShoppingCart, Trash2, Download, Plus, 
          Calendar, Send, Inbox, Clock, Check, X, FileText, Globe, Loader2, CheckSquare, Mail, MailOpen, RotateCcw, FileSpreadsheet, Eye, ExternalLink, ChevronLeft, ChevronRight, Filter, Calculator as CalcIcon, Copy
        } from 'https://esm.sh/lucide-react@0.292.0';
        import { initializeApp } from 'https://esm.sh/firebase@10.8.1/app';
        import { getAuth, signInAnonymously, signInWithCustomToken } from 'https://esm.sh/firebase@10.8.1/auth';
        import { getFirestore, collection, addDoc, updateDoc, doc, onSnapshot, query, serverTimestamp } from 'https://esm.sh/firebase@10.8.1/firestore';

        // --- CONFIG ---
        const PRODUCT_DB_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRrRDnJctzeF3FC_-81KzNHZIX3epxC6WwdmIbhXBGl1rlRKvSUfsvsZCZtuiPyULe5b2wJXOIYK8hs/pub?gid=25173144&single=true&output=csv';
        const CATEGORY_DB_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRrRDnJctzeF3FC_-81KzNHZIX3epxC6WwdmIbhXBGl1rlRKvSUfsvsZCZtuiPyULe5b2wJXOIYK8hs/pub?gid=481142784&single=true&output=csv';
        const FEES_DB_URL = 'https://docs.google.com/spreadsheets/d/1HSUiF20wpTJbfYdpOE08gtbRzm1N8IXOrZDs-KGSvnI/gviz/tq?tqx=out:csv&sheet=BiayaMarketplace';
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwgZLlREewOckszXJsF2rQYDbXlNq9UxB314iDJ9JQywdSsVkubRdHka44vaHsIYCgw/exec';

        // --- HELPER FUNCTIONS ---
        const Card = ({ children, className = "" }) => (
          <div className={`bg-white rounded-xl shadow-sm border border-slate-200 ${className}`}>
            {children}
          </div>
        );

        const formatIDR = (num) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(Number(num) || 0);

        const formatInput = (val) => {
            if (val === '' || val === null || val === undefined || isNaN(val)) return '';
            return val.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        };

        const parseInput = (val) => {
            if (!val) return '';
            const strVal = val.toString().replace(/[^0-9]/g, '');
            if (!strVal) return '';
            return parseInt(strVal, 10);
        };

        const formatDateTime = (dateString) => { 
            if (!dateString) return '-'; 
            try { return new Date(dateString).toLocaleString('id-ID', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' }); } 
            catch (e) { return '-'; } 
        };

        // --- COMPONENT: KALKULATOR TAMBAHAN ---
        const BasicCalculator = ({ onClose }) => {
            const [expression, setExpression] = useState('');

            const handleBtnClick = (val) => {
                if (val === 'C') setExpression('');
                else if (val === '=') {
                    try {
                        const result = eval(expression);
                        setExpression(String(Math.round(result * 100000000) / 100000000));
                    } catch (e) {
                        setExpression('Error');
                    }
                } else if (val === 'Del') {
                    setExpression(expression === 'Error' ? '' : expression.slice(0, -1));
                } else {
                    if (expression === 'Error') setExpression(val);
                    else setExpression(expression + val);
                }
            };

            return (
                <div className="absolute bottom-20 right-0 w-64 bg-white rounded-xl shadow-2xl border border-slate-200 overflow-hidden flex flex-col animate-in slide-in-from-bottom-5 z-[1000]">
                    <div className="bg-slate-800 text-white p-3 flex justify-between items-center">
                        <span className="font-bold text-xs flex items-center"><CalcIcon className="w-4 h-4 mr-2"/> Kalkulator Tambahan</span>
                        <button onClick={onClose}><X className="w-4 h-4 hover:text-red-400"/></button>
                    </div>
                    <div className="p-4 bg-slate-50">
                        <div className="bg-white border border-slate-200 p-2 rounded mb-3 text-right h-12 text-lg font-mono overflow-x-auto flex items-center justify-end select-all">
                            {expression || '0'}
                        </div>
                        <div className="grid grid-cols-4 gap-2 text-sm">
                            <button onClick={()=>handleBtnClick('C')} className="p-2 bg-red-100 text-red-700 rounded hover:bg-red-200 font-bold">C</button>
                            <button onClick={()=>handleBtnClick('Del')} className="p-2 bg-slate-200 rounded hover:bg-slate-300 font-bold">Del</button>
                            <button onClick={()=>handleBtnClick('/')} className="p-2 bg-slate-200 rounded hover:bg-slate-300 font-bold">/</button>
                            <button onClick={()=>handleBtnClick('*')} className="p-2 bg-slate-200 rounded hover:bg-slate-300 font-bold">*</button>
                            
                            <button onClick={()=>handleBtnClick('7')} className="p-2 bg-white border rounded hover:bg-slate-100 font-bold">7</button>
                            <button onClick={()=>handleBtnClick('8')} className="p-2 bg-white border rounded hover:bg-slate-100 font-bold">8</button>
                            <button onClick={()=>handleBtnClick('9')} className="p-2 bg-white border rounded hover:bg-slate-100 font-bold">9</button>
                            <button onClick={()=>handleBtnClick('-')} className="p-2 bg-slate-200 rounded hover:bg-slate-300 font-bold">-</button>
                            
                            <button onClick={()=>handleBtnClick('4')} className="p-2 bg-white border rounded hover:bg-slate-100 font-bold">4</button>
                            <button onClick={()=>handleBtnClick('5')} className="p-2 bg-white border rounded hover:bg-slate-100 font-bold">5</button>
                            <button onClick={()=>handleBtnClick('6')} className="p-2 bg-white border rounded hover:bg-slate-100 font-bold">6</button>
                            <button onClick={()=>handleBtnClick('+')} className="p-2 bg-slate-200 rounded hover:bg-slate-300 font-bold">+</button>
                            
                            <button onClick={()=>handleBtnClick('1')} className="p-2 bg-white border rounded hover:bg-slate-100 font-bold">1</button>
                            <button onClick={()=>handleBtnClick('2')} className="p-2 bg-white border rounded hover:bg-slate-100 font-bold">2</button>
                            <button onClick={()=>handleBtnClick('3')} className="p-2 bg-white border rounded hover:bg-slate-100 font-bold">3</button>
                            <button onClick={()=>handleBtnClick('=')} className="p-2 bg-blue-600 text-white rounded hover:bg-blue-700 font-bold row-span-2 flex items-center justify-center text-lg">=</button>
                            
                            <button onClick={()=>handleBtnClick('0')} className="p-2 bg-white border rounded hover:bg-slate-100 font-bold col-span-2">0</button>
                            <button onClick={()=>handleBtnClick('.')} className="p-2 bg-white border rounded hover:bg-slate-100 font-bold">.</button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- COMPONENT: SERVER QUICK CALCULATOR ---
        const ServerQuickCalculator = ({ fees }) => {
            const [values, setValues] = useState({ hpp: 50000, eceran: 100000 });
            const [show, setShow] = useState(false);

            const calculate = (basePrice) => {
                const totalPercent = (Number(fees.adminFee) || 0) + (Number(fees.layananXtra) || 0) + (Number(fees.insurance) || 0) + (Number(fees.komisiAMS) || 0);
                const decimal = totalPercent / 100;
                const fixed = (Number(fees.marketplaceProcessingFee) || 0) + (Number(fees.jubelioProcessingFee) || 0) + (Number(fees.packingFee) || 0);
                
                const safeBasePrice = Number(basePrice) || 0;
                const safeHpp = Number(values.hpp) || 0;

                let sellingPrice = 0;
                let totalNet = safeBasePrice;
                
                if (1 - decimal > 0) sellingPrice = (totalNet + fixed) / (1 - decimal);
                sellingPrice = Math.round(sellingPrice); 

                const percentFeeVal = sellingPrice * decimal;
                const totalDed = percentFeeVal + fixed;
                const netRevenue = sellingPrice - totalDed;
                
                // HPP Total
                const totalHPP = safeHpp;
                const profit = netRevenue - totalHPP;
                const margin = sellingPrice > 0 ? (profit / sellingPrice) * 100 : 0;

                return { sellingPrice, netRevenue, profit, margin };
            };

            const t1 = calculate(values.eceran);

            return (
                <div className="mb-6 border border-indigo-200 bg-indigo-50/50 rounded-xl overflow-hidden">
                    <div className="p-3 bg-indigo-100/80 flex justify-between items-center cursor-pointer" onClick={() => setShow(!show)}>
                        <h3 className="font-bold text-indigo-800 flex items-center text-sm"><CalcIcon className="w-4 h-4 mr-2"/> Kalkulator Cepat (Bantu Hitung Saran)</h3>
                        {show ? <ChevronUp className="w-4 h-4 text-indigo-600"/> : <ChevronDown className="w-4 h-4 text-indigo-600"/>}
                    </div>
                    {show && (
                        <div className="p-4 grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div className="space-y-2 border-r border-indigo-200 pr-4">
                                <div>
                                    <label className="text-[10px] font-bold text-indigo-600 uppercase">HPP (Modal)</label>
                                    <input type="text" inputMode="numeric" className="w-full p-1.5 border rounded text-xs" value={formatInput(values.hpp)} onChange={e => setValues({...values, hpp: parseInput(e.target.value)})} />
                                </div>
                                <div>
                                    <label className="text-[10px] font-bold text-indigo-600 uppercase">Input Eceran</label>
                                    <input type="text" inputMode="numeric" className="w-full p-1.5 border rounded text-xs" value={formatInput(values.eceran)} onChange={e => setValues({...values, eceran: parseInput(e.target.value)})} />
                                </div>
                            </div>
                            <div className="space-y-2">
                                <h4 className="text-xs font-bold text-center border-b pb-1">Hasil Satuan</h4>
                                <div className="flex justify-between text-xs"><span>Tayang:</span> <span className="font-bold">{formatIDR(t1.sellingPrice)}</span></div>
                                <div className="flex justify-between text-xs"><span>Net:</span> <span className="font-bold text-green-600">{formatIDR(t1.netRevenue)}</span></div>
                                <div className="flex justify-between text-xs"><span>Profit:</span> <span className={`${t1.profit < 0 ? 'text-red-600' : 'text-blue-600'}`}>{formatIDR(t1.profit)}</span></div>
                                <div className="flex justify-between text-xs"><span>Margin:</span> <span className="font-bold">{t1.margin.toFixed(1)}%</span></div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- COMPONENT: SUBMISSION CARD ---
        const SubmissionCard = ({ sub, currentUser, isServer, isAdmin, canSeeHPP, serverDrafts, expandedSubmissionId, onToggle, onDraftChange, onUpdateStatus, onEdit, productList }) => {
            let statusColor = 'bg-yellow-100 text-yellow-600';
            let statusBadgeColor = 'bg-yellow-50 text-yellow-700 border-yellow-200';
            let StatusIcon = MailOpen;

            if (sub.status === 'revision') {
                statusColor = 'bg-orange-100 text-orange-600';
                statusBadgeColor = 'bg-orange-50 text-orange-700 border-orange-200';
                StatusIcon = RefreshCw;
            } else if (sub.status === 'completed' || sub.status === 'approved') {
                statusColor = 'bg-green-100 text-green-600';
                statusBadgeColor = 'bg-green-50 text-green-700 border-green-200';
                StatusIcon = CheckCircle2;
            } else if (sub.status === 'rejected') {
                statusColor = 'bg-red-100 text-red-600';
                statusBadgeColor = 'bg-red-50 text-red-700 border-red-200';
                StatusIcon = AlertCircle;
            }

            if (sub.status === 'pending' && isServer && !sub.isRead) {
                StatusIcon = Mail;
            }

            const displayStatusName = sub.status === 'completed' ? 'Selesai' : sub.status === 'revision' ? 'Revisi' : sub.status;
            const isCompetitorSub = sub.items && sub.items.length > 0 && sub.items[0]?.isCompetitorData;
            const isOwner = sub.sender === currentUser;

            return (
                <div className={`bg-white rounded-xl shadow-sm border transition-all ${sub.isRead || !isServer ? 'border-slate-200' : 'border-blue-300 ring-1 ring-blue-100'}`}>
                    <div className={`p-4 flex justify-between items-center cursor-pointer transition-colors ${sub.isRead || !isServer ? 'bg-white hover:bg-slate-50' : 'bg-blue-50/40 hover:bg-blue-50/60'}`} onClick={() => onToggle(sub.id)}>
                        <div className="flex items-center space-x-4">
                            <div className={`p-2 rounded-full ${statusColor}`}>
                                <StatusIcon className="w-5 h-5"/>
                            </div>
                            <div>
                                <div className={`flex items-center gap-2 ${!sub.isRead && isServer ? 'font-extrabold text-blue-900' : 'font-bold text-slate-800'}`}>
                                    {isCompetitorSub ? 'Review Kompetitor' : 'Pengajuan Harga'} #{String(sub.id).slice(-4)} 
                                    <span className={`text-[10px] px-2 py-0.5 rounded-full uppercase border font-bold ${statusBadgeColor}`}>{displayStatusName}</span>
                                    {!sub.isRead && isServer && <span className="w-2 h-2 rounded-full bg-blue-600 ml-1"></span>}
                                </div>
                                <div className="text-xs text-slate-500">Dari: <span className="font-medium text-slate-700 uppercase">{String(sub.sender)}</span> &bull; {formatDateTime(sub.timestamp)} &bull; {Number(sub.totalItems) || 0} Item</div>
                            </div>
                        </div>
                        <ChevronDown className={`w-5 h-5 text-slate-400 transition-transform ${expandedSubmissionId === sub.id ? 'rotate-180' : ''}`}/>
                    </div>
                    
                    {expandedSubmissionId === sub.id && (
                        <div className="p-4 bg-slate-50/50 border-t border-slate-100 animate-in fade-in slide-in-from-top-2">
                            {sub.clientNote && (
                                <div className="mb-4 p-3 bg-white border border-slate-200 rounded-lg text-sm text-slate-700 flex items-start shadow-sm">
                                    <User className="w-4 h-4 mr-2 mt-0.5 flex-shrink-0 text-slate-400" />
                                    <div><span className="font-bold">Catatan <span className="capitalize">{String(sub.sender)}</span>:</span> {String(sub.clientNote)}</div>
                                </div>
                            )}
                            {sub.serverNote && (
                                <div className="mb-4 p-3 bg-blue-50 border border-blue-100 rounded-lg text-sm text-blue-800 flex items-start">
                                    <Info className="w-4 h-4 mr-2 mt-0.5 flex-shrink-0" />
                                    <div><span className="font-bold">Catatan Server:</span> {String(sub.serverNote)}</div>
                                </div>
                            )}

                            <div className="overflow-x-auto mb-4 border rounded-lg bg-white">
                                {isCompetitorSub ? (
                                    <table className="w-full text-xs text-left">
                                        <thead className="bg-slate-100 text-slate-600 font-medium">
                                            <tr>
                                                {isServer && sub.status === 'pending' && <th className="px-3 py-2 w-10 text-center"><CheckSquare className="w-4 h-4 mx-auto"/></th>}
                                                {isAdmin && sub.status !== 'pending' && <th className="px-3 py-2 w-10 text-center">Sts</th>}
                                                <th className="px-3 py-2">Produk Kita</th>
                                                
                                                {canSeeHPP && <th className="px-3 py-2 text-right bg-red-50 text-red-800">HPP</th>}
                                                {canSeeHPP && <th className="px-3 py-2 text-right bg-red-50 text-red-800">Eceran</th>}
                                                {canSeeHPP && <th className="px-3 py-2 text-right bg-red-50 text-red-800">Grosir</th>}
                                                {canSeeHPP && <th className="px-3 py-2 text-right bg-red-50 text-red-800">Partai</th>}
                                                
                                                <th className="px-3 py-2 text-right bg-blue-50">Harga Tayang Kita</th>
                                                <th className="px-3 py-2 border-l border-slate-200 bg-red-50">Komp A</th>
                                                <th className="px-3 py-2 text-right bg-red-50">Harga A</th>
                                                <th className="px-3 py-2 text-center bg-red-50">Link A</th>
                                                <th className="px-3 py-2 border-l border-slate-200 bg-red-50">Komp B</th>
                                                <th className="px-3 py-2 text-right bg-red-50">Harga B</th>
                                                <th className="px-3 py-2 text-center bg-red-50">Link B</th>
                                                <th className="px-3 py-2 text-right bg-yellow-100 border-l border-slate-200 w-32">Saran Harga</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {(sub.items || []).map((item, idx) => {
                                                if(!item) return null;
                                                const compA_Name = item.compAName || item.compName || '-';
                                                const compA_Price = item.compAPrice || item.compPrice || 0;
                                                const compA_Link = item.compALink || item.compLink || '';
                                                
                                                const liveData = (productList || []).find(p => p.sku === item.sku) || {};
                                                const refHpp = liveData.hpp || item.hpp || 0;
                                                const refEceran = liveData.eceran || item.eceran || 0;
                                                const refGrosir = liveData.grosir || item.grosir || 0;
                                                const refPartai = liveData.partai || item.partai || 0;

                                                return (
                                                <tr key={idx} className={item.itemStatus === 'rejected' ? 'bg-red-50/50' : item.itemStatus === 'approved' ? 'bg-green-50/50' : item.itemStatus === 'revision' ? 'bg-orange-50/50' : ''}>
                                                    {isServer && sub.status === 'pending' && (
                                                        <td className="px-3 py-2 text-center">
                                                            <input type="checkbox" className="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500" checked={!!serverDrafts[sub.id]?.checkedItems?.[item.sku]} onChange={() => onDraftChange(sub.id, 'check', null, item.sku)} />
                                                        </td>
                                                    )}
                                                    {isAdmin && sub.status !== 'pending' && (
                                                        <td className="px-3 py-2 text-center">
                                                            {item.itemStatus === 'approved' ? <CheckCircle2 className="w-4 h-4 text-green-500 mx-auto"/> : item.itemStatus === 'revision' ? <RefreshCw className="w-4 h-4 text-orange-500 mx-auto"/> : <X className="w-4 h-4 text-red-500 mx-auto"/>}
                                                        </td>
                                                    )}
                                                    <td className="px-3 py-2">
                                                        <div className="font-medium text-slate-800 whitespace-nowrap">{String(item.name || '')}</div>
                                                        <div className="text-[10px] text-slate-500 font-mono">{String(item.sku || '')}</div>
                                                    </td>

                                                    {canSeeHPP && <td className="px-3 py-2 text-right bg-red-50 text-red-800 font-mono">{formatIDR(refHpp)}</td>}
                                                    {canSeeHPP && <td className="px-3 py-2 text-right bg-red-50 text-red-800 font-mono">{formatIDR(refEceran)}</td>}
                                                    {canSeeHPP && <td className="px-3 py-2 text-right bg-red-50 text-red-800 font-mono">{formatIDR(refGrosir)}</td>}
                                                    {canSeeHPP && <td className="px-3 py-2 text-right bg-red-50 text-red-800 font-mono">{formatIDR(refPartai)}</td>}

                                                    <td className="px-3 py-2 text-right bg-blue-50/30 font-bold text-slate-700 whitespace-nowrap">{formatIDR(item.ownPrice)}</td>
                                                    <td className="px-3 py-2 border-l border-slate-200 bg-red-50/30 font-medium text-slate-800 whitespace-nowrap">{compA_Name}</td>
                                                    <td className="px-3 py-2 text-right bg-red-50/30 font-bold text-red-700 whitespace-nowrap">{formatIDR(compA_Price)}</td>
                                                    <td className="px-3 py-2 text-center bg-red-50/30">
                                                        {compA_Link ? <a href={String(compA_Link)} target="_blank" rel="noopener noreferrer" className="text-blue-500 hover:text-blue-700 bg-white p-1 rounded inline-block shadow-sm"><ExternalLink className="w-3.5 h-3.5"/></a> : '-'}
                                                    </td>
                                                    <td className="px-3 py-2 border-l border-slate-200 bg-red-50/30 font-medium text-slate-800 whitespace-nowrap">{item.compBName || '-'}</td>
                                                    <td className="px-3 py-2 text-right bg-red-50/30 font-bold text-red-700 whitespace-nowrap">{item.compBPrice ? formatIDR(item.compBPrice) : '-'}</td>
                                                    <td className="px-3 py-2 text-center bg-red-50/30">
                                                        {item.compBLink ? <a href={String(item.compBLink)} target="_blank" rel="noopener noreferrer" className="text-blue-500 hover:text-blue-700 bg-white p-1 rounded inline-block shadow-sm"><ExternalLink className="w-3.5 h-3.5"/></a> : '-'}
                                                    </td>
                                                    <td className="px-3 py-2 text-right bg-yellow-50 border-l border-slate-200">
                                                        {isServer && (sub.status === 'pending' || sub.status === 'revision') ? (
                                                            <input type="text" inputMode="numeric" className="w-full text-right p-1.5 text-xs border border-yellow-400 rounded focus:outline-none focus:ring-1 focus:ring-yellow-500 font-bold" placeholder="Saran" onChange={(e) => onDraftChange(sub.id, 'revision', parseInput(e.target.value), item.sku)} value={formatInput(serverDrafts[sub.id]?.revisions?.[item.sku])} />
                                                        ) : (
                                                            <span className="font-bold text-yellow-700 whitespace-nowrap">{sub.revisions?.[item.sku] ? formatIDR(sub.revisions[item.sku]) : '-'}</span>
                                                        )}
                                                    </td>
                                                </tr>
                                            )})}
                                        </tbody>
                                    </table>
                                ) : (
                                    <table className="w-full text-xs text-left">
                                        <thead className="bg-slate-100 text-slate-600 font-medium">
                                            <tr>
                                                {isServer && sub.status === 'pending' && <th className="px-3 py-2 w-10 text-center"><CheckSquare className="w-4 h-4 mx-auto"/></th>}
                                                {isAdmin && sub.status !== 'pending' && <th className="px-3 py-2 w-10 text-center">Sts</th>}
                                                <th className="px-3 py-2">Produk Kita</th>
                                                
                                                {canSeeHPP && <th className="px-3 py-2 text-right bg-red-50 text-red-800">HPP</th>}
                                                {canSeeHPP && <th className="px-3 py-2 text-right bg-red-50 text-red-800">Eceran</th>}
                                                {canSeeHPP && <th className="px-3 py-2 text-right bg-red-50 text-red-800">Grosir</th>}
                                                
                                                <th className="px-3 py-2 text-right bg-blue-50/50">Satuan</th>
                                                <th className="px-3 py-2 text-right bg-green-50/50">Min 3</th>
                                                <th className="px-3 py-2 text-right bg-green-50/50">Min 6</th>
                                                <th className="px-3 py-2 text-right bg-green-50/50">Min 12</th>
                                                <th className="px-3 py-2 text-right bg-green-50/50">Custom</th>

                                                {((isServer && sub.status === 'pending') || (sub.revisions && Object.keys(sub.revisions || {}).some(k => !k.includes('_pkg') && k !== '_clientNote'))) && (
                                                    <th className="px-3 py-2 text-right w-28 bg-yellow-50">Saran (Sat)</th>
                                                )}
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {(sub.items || []).map((item, idx) => {
                                                if(!item) return null;
                                                return (
                                                <tr key={idx} className={item.itemStatus === 'rejected' ? 'bg-red-50/50' : item.itemStatus === 'approved' ? 'bg-green-50/50' : item.itemStatus === 'revision' ? 'bg-orange-50/50' : ''}>
                                                    {isServer && sub.status === 'pending' && (
                                                        <td className="px-3 py-2 text-center">
                                                            <input type="checkbox" className="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500" checked={!!serverDrafts[sub.id]?.checkedItems?.[item.sku]} onChange={() => onDraftChange(sub.id, 'check', null, item.sku)} />
                                                        </td>
                                                    )}
                                                    {isAdmin && sub.status !== 'pending' && (
                                                        <td className="px-3 py-2 text-center">
                                                            {item.itemStatus === 'approved' ? <CheckCircle2 className="w-4 h-4 text-green-500 mx-auto"/> : item.itemStatus === 'revision' ? <RefreshCw className="w-4 h-4 text-orange-500 mx-auto"/> : <X className="w-4 h-4 text-red-500 mx-auto"/>}
                                                        </td>
                                                    )}
                                                    <td className="px-3 py-2">
                                                        <div className="font-medium text-slate-800 whitespace-nowrap">{String(item.name || '')}</div>
                                                        <div className="text-[10px] text-slate-500 font-mono">{String(item.sku || '')}</div>
                                                    </td>
                                                    {canSeeHPP && <td className="px-3 py-2 text-right bg-red-50 text-red-800 font-mono">{formatIDR(item.hpp)}</td>}
                                                    {canSeeHPP && <td className="px-3 py-2 text-right bg-red-50 text-red-800 font-mono">{formatIDR(item.eceran || item.basePrice || 0)}</td>}
                                                    {canSeeHPP && <td className="px-3 py-2 text-right bg-red-50 text-red-800 font-mono">{formatIDR(item.grosir || 0)}</td>}
                                                    
                                                    <td className="px-3 py-2 text-right bg-blue-50/30">
                                                        <div className="font-bold text-slate-800">{formatIDR(item.sellingPrice)}</div>
                                                        <div className="text-[9px] text-blue-600 font-medium">Margin: {item.margin || 10}%</div>
                                                    </td>
                                                    <td className="px-3 py-2 text-right bg-green-50/30 font-medium text-green-800">{formatIDR(item.priceMin3)}</td>
                                                    <td className="px-3 py-2 text-right bg-green-50/30 font-medium text-green-800">{formatIDR(item.priceMin6)}</td>
                                                    <td className="px-3 py-2 text-right bg-green-50/30 font-medium text-green-800">{formatIDR(item.priceMin12)}</td>
                                                    <td className="px-3 py-2 text-right bg-green-50/30 font-medium text-green-800">
                                                        {item.customQtyValue ? (
                                                            <div>
                                                                <div>{formatIDR(item.priceCustom)}</div>
                                                                <div className="text-[9px] text-green-700 opacity-80">Min: {item.customQtyValue}</div>
                                                            </div>
                                                        ) : '-'}
                                                    </td>

                                                    {((isServer && sub.status === 'pending') || (sub.revisions && Object.keys(sub.revisions || {}).some(k => !k.includes('_pkg') && k !== '_clientNote'))) ? (
                                                        <td className="px-2 py-1 text-right bg-yellow-50">
                                                            {isServer && sub.status === 'pending' ? (
                                                                <input type="text" inputMode="numeric" className="w-full text-right p-1 text-xs border border-yellow-300 rounded focus:outline-none focus:ring-1 focus:ring-yellow-500" placeholder={String(item.sellingPrice)} onChange={(e) => onDraftChange(sub.id, 'revision', parseInput(e.target.value), item.sku)} value={formatInput(serverDrafts[sub.id]?.revisions?.[item.sku])} />
                                                            ) : (<span className="font-bold text-yellow-700">{sub.revisions?.[item.sku] ? formatIDR(sub.revisions[item.sku]) : '-'}</span>)}
                                                        </td>
                                                    ) : null}
                                                </tr>
                                            )})}
                                        </tbody>
                                    </table>
                                )}
                            </div>
                            
                            <div className="flex justify-between items-center pt-2">
                                 {isServer && sub.status !== 'pending' && (
                                     <button onClick={() => onUpdateStatus(sub.id, 'pending')} className="flex items-center text-xs text-blue-600 hover:text-blue-800 font-bold"><RotateCcw className="w-3.5 h-3.5 mr-1"/> Edit / Tinjau Ulang</button>
                                 )}
                                 {isServer && sub.status === 'pending' && (
                                    <div className="w-full">
                                        <label className="block text-xs font-semibold text-slate-700 mb-2">Tambahkan Catatan / Arahan Revisi:</label>
                                        <textarea className="w-full p-2 text-sm border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none mb-4" rows="2" placeholder="Catatan untuk admin..." value={serverDrafts[sub.id]?.note || ''} onChange={(e) => onDraftChange(sub.id, 'note', e.target.value)}></textarea>
                                        <div className="flex gap-3 justify-end items-center flex-wrap">
                                            <div className="text-[10px] text-slate-500 mr-auto flex items-center bg-slate-100 px-2 py-1 rounded"><Info className="w-3 h-3 mr-1" />Item yg <strong>tidak dicentang</strong> = Ditolak</div>
                                            <button onClick={() => onUpdateStatus(sub.id, 'rejected')} className="flex items-center px-4 py-2 bg-white border border-red-200 text-red-600 rounded-lg hover:bg-red-50 font-bold text-xs transition-colors"><X className="w-4 h-4 mr-1"/> Tolak Semua</button>
                                            <button onClick={() => onUpdateStatus(sub.id, 'revision')} className="flex items-center px-4 py-2 bg-white border border-orange-200 text-orange-600 rounded-lg hover:bg-orange-50 font-bold text-xs transition-colors"><RefreshCw className="w-4 h-4 mr-1"/> Revisi Kembali</button>
                                            <button onClick={() => onUpdateStatus(sub.id, 'reviewed')} className="flex items-center px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-bold text-xs transition-colors shadow-sm"><Check className="w-4 h-4 mr-1"/> Proses Persetujuan</button>
                                        </div>
                                    </div>
                                )}
                                {isAdmin && sub.status === 'revision' && isOwner && (
                                    <div className="w-full flex justify-end">
                                        <button onClick={() => onEdit(sub)} className="flex items-center px-4 py-2 bg-orange-600 text-white rounded-lg hover:bg-orange-700 font-bold text-xs transition-colors shadow-sm animate-pulse"><Edit3 className="w-4 h-4 mr-1.5"/> Edit Data & Kirim Ulang</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        function App() {
          const [isLoggedIn, setIsLoggedIn] = useState(false);
          const [currentUser, setCurrentUser] = useState(null); 
          const [loginForm, setLoginForm] = useState({ username: '', password: '' });
          const [loginError, setLoginError] = useState('');

          const [db, setDb] = useState(null);
          const [appId, setAppId] = useState(null);
          const [isOnline, setIsOnline] = useState(false);
          
          const [product, setProduct] = useState({ hpp: 50000, basePrice: 100000 });
          const [productList, setProductList] = useState([]);
          const [isLoading, setIsLoading] = useState(false);
          const [isLoadingHistory, setIsLoadingHistory] = useState(false);
          const [isSending, setIsSending] = useState(false);
          const [lastUpdated, setLastUpdated] = useState(null);
          const [selectedSku, setSelectedSku] = useState('');
          const [searchTerm, setSearchTerm] = useState('');
          
          const [cart, setCart] = useState([]);
          const [competitorCart, setCompetitorCart] = useState([]); 
          const [submissionNote, setSubmissionNote] = useState(''); 
          const [editingSubmissionId, setEditingSubmissionId] = useState(null); 
          
          const [compForm, setCompForm] = useState({ ownPrice: '', compAName: '', compAPrice: '', compALink: '', compBName: '', compBPrice: '', compBLink: '' });

          // --- STATE UNTUK PEMBULATAN & MASS UPDATE ---
          const [rounding, setRounding] = useState('none');
          const [massMargin, setMassMargin] = useState('');
          const [massFee, setMassFee] = useState('');
          const [massPack, setMassPack] = useState(''); // State Packing Massal
          const [massHppRef, setMassHppRef] = useState(''); // State Acuan HPP Massal
          
          // --- STATE UNTUK BATCH ADD DROPDOWN ---
          const [multiSelectedSkus, setMultiSelectedSkus] = useState([]);

          // --- STATE UNTUK ADD BY BRAND & CATEGORY ---
          const [showAddBrandModal, setShowAddBrandModal] = useState(false);
          const [brandSearchTerm, setBrandSearchTerm] = useState('');
          const [brandSearchResults, setBrandSearchResults] = useState([]);

          const [categories, setCategories] = useState([]);
          const [skuCategoryMap, setSkuCategoryMap] = useState({});
          const [showAddCategoryModal, setShowAddCategoryModal] = useState(false);
          const [selectedCategory, setSelectedCategory] = useState('');
          const [categorySearchResults, setCategorySearchResults] = useState([]);

          // --- STATE UNTUK SETTINGS ---
          const [showSettings, setShowSettings] = useState(false);
          const [isSavingFees, setIsSavingFees] = useState(false);
          const [showBasicCalc, setShowBasicCalc] = useState(false);

          // --- STATE UNTUK PAGINATION CART ---
          const [cartPage, setCartPage] = useState(1);
          const [cartItemsPerPage, setCartItemsPerPage] = useState(10);

          // Safe Load Submissions
          const [submissions, setSubmissions] = useState(() => {
            try {
              const saved = localStorage.getItem('marketplace_submissions');
              if (!saved) return [];
              const parsed = JSON.parse(saved);
              if (!Array.isArray(parsed)) return [];
              return parsed.map(s => ({
                  ...s,
                  items: Array.isArray(s.items) ? s.items.filter(i => i) : [],
                  revisions: s.revisions || {}
              }));
            } catch (e) { return []; }
          }); 
          
          const [serverDrafts, setServerDrafts] = useState({}); 
          const [expandedSubmissionId, setExpandedSubmissionId] = useState(null);
          const [activeView, setActiveView] = useState('calculator'); 
          const [displayLimit, setDisplayLimit] = useState(50);
          
          const [fees, setFees] = useState({ 
              adminFee: 10.0, 
              layananXtra: 5.5, 
              marketplaceProcessingFee: 1250, 
              jubelioProcessingFee: 350, 
              insurance: 0.5, 
              packingFee: 550, 
              komisiAMS: 1.0 
          });
          
          const [customQty, setCustomQty] = useState(24);
          const [showCustomQty, setShowCustomQty] = useState(false);
          const [showFeeSettings, setShowFeeSettings] = useState(false);
          const [showProductList, setShowProductList] = useState(false);
          const [isRefreshing, setIsRefreshing] = useState(false);
          const [confirmClear, setConfirmClear] = useState(false);
          const [notification, setNotification] = useState('');

          const showNotif = (msg) => {
              setNotification(msg);
              setTimeout(() => setNotification(''), 3000);
          };

          const handleCopyPrice = (price, e) => {
              if (e) e.stopPropagation();
              if (!price) return;
              const textToCopy = Math.round(price).toString();
              
              const fallbackCopy = (text) => {
                  const textArea = document.createElement("textarea");
                  textArea.value = text;
                  
                  // Menghindari browser scroll otomatis ke textarea
                  textArea.style.position = "fixed";
                  textArea.style.top = "0";
                  textArea.style.left = "0";
                  textArea.style.width = "2em";
                  textArea.style.height = "2em";
                  textArea.style.padding = "0";
                  textArea.style.border = "none";
                  textArea.style.outline = "none";
                  textArea.style.boxShadow = "none";
                  textArea.style.background = "transparent";
                  
                  document.body.appendChild(textArea);
                  textArea.focus();
                  textArea.select();
                  try { document.execCommand('copy'); } catch (err) {}
                  document.body.removeChild(textArea);
              };

              fallbackCopy(textToCopy);
              showNotif(`Harga disalin: ${textToCopy}`);
          };

          // --- Pagination & Filtering State ---
          const ITEMS_PER_PAGE = 5;
          const [pendingPage, setPendingPage] = useState(1);
          const [completedPage, setCompletedPage] = useState(1);
          const [pendingFilter, setPendingFilter] = useState('all'); 
          const [completedFilter, setCompletedFilter] = useState('all');

          // --- LOGIC CALCULATOR ---
          const calculateTier = useCallback((tier, index) => {
            const totalPercent = (Number(fees.adminFee) || 0) + (Number(fees.layananXtra) || 0) + (Number(fees.insurance) || 0) + (Number(fees.komisiAMS) || 0);
            const decimal = totalPercent / 100;
            const fixed = (Number(fees.marketplaceProcessingFee) || 0) + (Number(fees.jubelioProcessingFee) || 0) + (Number(fees.packingFee) || 0); // Pake packingFee
            
            const safeBase = Number(product.basePrice) || 0;
            const safeHpp = Number(product.hpp) || 0;

            let sellingPrice = safeBase;
            
            const percentFeeVal = sellingPrice * decimal;
            const totalDed = percentFeeVal + fixed;
            const net = sellingPrice - totalDed;
            const profit = net - safeHpp;
            const margin = sellingPrice > 0 ? (profit / sellingPrice) * 100 : 0;
            
            return { 
                sellingPrice, 
                percentFeeValue: percentFeeVal, 
                fixedFeeValue: fixed, 
                totalDeduction: totalDed, 
                netRevenue: net, 
                profit, 
                margin, 
                totalHPP: safeHpp 
            };
          }, [product, fees]);

          // RUMUS YANG DIGUNAKAN BERDASARKAN PERMINTAAN USER:
          const calculateRecommendation = useCallback((marginPercent, qty = 1) => {
              const safeHpp = Number(product.hpp) || 0;
              const totalPercentFee = (Number(fees.adminFee) || 0) + (Number(fees.layananXtra) || 0) + (Number(fees.insurance) || 0) + (Number(fees.komisiAMS) || 0);
              const hppWithAdmin = safeHpp * (1 + (totalPercentFee / 100)); // Dynamically calculated
              const withMargin = hppWithAdmin * (1 + (marginPercent / 100)); // * (Misal: 110%)
              
              const activeProcessingFee = (Number(fees.marketplaceProcessingFee) || 0) + (Number(fees.jubelioProcessingFee) || 0);
              const activePackingFee = Number(fees.packingFee) || 0;
              const fixedFeePerItem = (activeProcessingFee + activePackingFee) / (qty || 1); 
              
              const rawPrice = withMargin + fixedFeePerItem;
              
              if (rounding === '100') return Math.ceil(rawPrice / 100) * 100;
              if (rounding === '500') return Math.ceil(rawPrice / 500) * 500;
              if (rounding === '1000') return Math.ceil(rawPrice / 1000) * 1000;
              return Math.round(rawPrice); 
          }, [product.hpp, fees.adminFee, fees.layananXtra, fees.insurance, fees.komisiAMS, fees.marketplaceProcessingFee, fees.jubelioProcessingFee, fees.packingFee, rounding]);

          // HELPER KHUSUS UNTUK HITUNGAN KERANJANG AGAR KONSISTEN DENGAN PEMBULATAN
          const calculateItemPrices = useCallback((hpp, margin, fee, packFee, customQtyValue, currentRounding) => {
              const safeHpp = Number(hpp) || 0;
              const totalPercentFee = (Number(fees.adminFee) || 0) + (Number(fees.layananXtra) || 0) + (Number(fees.insurance) || 0) + (Number(fees.komisiAMS) || 0);
              
              const calc = (qty) => {
                  const hppWithAdmin = safeHpp * (1 + (totalPercentFee / 100));
                  const withMargin = hppWithAdmin * (1 + (margin / 100));
                  const fixedFeePerItem = (fee + packFee) / (qty || 1);
                  const rawPrice = withMargin + fixedFeePerItem;
                  if (currentRounding === '100') return Math.ceil(rawPrice / 100) * 100;
                  if (currentRounding === '500') return Math.ceil(rawPrice / 500) * 500;
                  if (currentRounding === '1000') return Math.ceil(rawPrice / 1000) * 1000;
                  return Math.round(rawPrice);
              };

              return {
                  sellingPrice: calc(1),
                  priceMin3: calc(3),
                  priceMin6: calc(6),
                  priceMin12: calc(12),
                  priceCustom: customQtyValue ? calc(customQtyValue) : null
              };
          }, [fees.adminFee, fees.layananXtra, fees.insurance, fees.komisiAMS]);

          useEffect(() => {
              if (selectedSku) {
                  const autoPrice = calculateRecommendation(10, 1);
                  if (autoPrice > 0) {
                      setProduct(prev => ({ ...prev, basePrice: autoPrice }));
                  }
              }
          }, [selectedSku, calculateRecommendation]);

          // Reset cart pagination if items per page changes
          useEffect(() => {
              setCartPage(1);
          }, [cartItemsPerPage]);

          // Ensure cart page is within bounds when items are deleted
          useEffect(() => {
              const maxPage = Math.ceil(cart.length / cartItemsPerPage) || 1;
              if (cartPage > maxPage) {
                  setCartPage(maxPage);
              }
          }, [cart.length, cartItemsPerPage, cartPage]);

          const calculateEffectiveDiscount = useCallback((p1, p2, qty) => { const norm = p1 * qty; if (norm <= 0) return 0; return ((norm - p2) / norm) * 100; }, []);

          // --- VARS ---
          const userLower = String(currentUser || '').toLowerCase();
          const isServer = ['server', 'bobby'].includes(userLower);
          const isAdmin = ['admin', 'stefany', 'isa', 'winda'].includes(userLower);
          const canSeeHPP = isServer;
          const totalPercentFeeVal = (Number(fees.adminFee) || 0) + (Number(fees.layananXtra) || 0) + (Number(fees.insurance) || 0) + (Number(fees.komisiAMS) || 0);
          const filteredProducts = productList.filter(p => {
            const term = searchTerm.toLowerCase().trim();
            if (!term) return true;
            return String(p.name).toLowerCase().includes(term) || String(p.sku).toLowerCase().includes(term);
          });
          const selectedProductData = productList.find(p => p.sku === selectedSku);
          const productUnit = selectedProductData?.unit ? ` / ${selectedProductData.unit}` : ' / unit';
          const t1Result = calculateTier(null, 0);
          const t1IsLoss = t1Result.profit <= 0;
          
          // Cart Pagination logic
          const totalCartPages = Math.ceil(cart.length / cartItemsPerPage) || 1;
          const currentCartPage = Math.min(cartPage, totalCartPages);
          const paginatedCart = cart.slice((currentCartPage - 1) * cartItemsPerPage, currentCartPage * cartItemsPerPage);

          // Define Filtered Lists
          const pendingList = submissions.filter(s => s.status === 'pending' || s.status === 'revision');
          const completedList = submissions.filter(s => ['completed', 'approved', 'rejected'].includes(s.status));

          // --- EFFECTS ---
          useEffect(() => {
            const initFirebase = async () => {
              try {
                if (typeof __firebase_config !== 'undefined') {
                    const firebaseConfig = JSON.parse(__firebase_config);
                    const app = initializeApp(firebaseConfig);
                    const auth = getAuth(app);
                    const dbRef = getFirestore(app);
                    const aId = typeof __app_id !== 'undefined' ? __app_id : 'default';
                    setDb(dbRef); setAppId(aId);
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                    else await signInAnonymously(auth);
                    setIsOnline(true);
                } else {
                    setIsOnline(false);
                }
              } catch (e) { setIsOnline(false); }
            };
            initFirebase();
          }, []);

          const fetchFeesData = useCallback(async () => {
              try {
                const res = await fetch(`${FEES_DB_URL}&t=${Date.now()}`).catch(() => null);
                if (!res || !res.ok) return;
                const text = await res.text();
                const parseLine = (str) => {
                    const arr = []; let q = false, s = 0;
                    for(let i=0;i<str.length;i++){ if(str[i]==='"')q=!q; else if(str[i]===','&&!q){ arr.push(str.substring(s,i)); s=i+1; } }
                    arr.push(str.substring(s)); return arr.map(v => v.replace(/^"|"$/g,'').replace(/""/g,'"').trim());
                };
                const lines = text.split('\n').filter(l => l.trim());
                if (lines.length > 1) {
                    const headers = parseLine(lines[0]);
                    const values = parseLine(lines[1]);
                    const newFees = { ...fees };
                    headers.forEach((h, i) => {
                        const key = h.trim();
                        const val = Number(values[i]);
                        if (!isNaN(val) && Object.prototype.hasOwnProperty.call(newFees, key)) {
                            newFees[key] = val;
                        }
                    });
                    setFees(newFees);
                }
              } catch(e) { console.warn('Gagal memuat biaya marketplace:', e.message); }
          }, []);

          const fetchCsvData = useCallback(async () => {
            setIsLoading(true);
            try {
              const res = await fetch(`${PRODUCT_DB_URL}&t=${Date.now()}`).catch(() => null);
              if (!res || !res.ok) return;
              const text = await res.text();
              const lines = text.split('\n');
              if (lines.length < 2) return;
              const parseLine = (str) => {
                  const arr = []; let q = false, s = 0;
                  for(let i=0;i<str.length;i++){ if(str[i]==='"')q=!q; else if(str[i]===','&&!q){ arr.push(str.substring(s,i)); s=i+1; } }
                  arr.push(str.substring(s)); return arr.map(v => v.replace(/^"|"$/g,'').replace(/""/g,'"').trim());
              };
              
              const header = parseLine(lines[0]).map(v=>v.toLowerCase());
              const idx = { 
                  name: header.findIndex(h=>h.includes('nama')||h.includes('produk')), 
                  sku: header.findIndex(h=>h.includes('sku')||h.includes('kode')),
                  unit: header.findIndex(h=>h.includes('unit')),
                  hpp: header.findIndex(h=>h.includes('hpp')||h.includes('modal')),
                  ecer: header.findIndex(h=>h.includes('ecer')||h.includes('retail')),
                  grosir: header.findIndex(h=>h.includes('grosir')),
                  partai: header.findIndex(h=>h.includes('partai'))
              };
              const products = lines.slice(1).map(l => {
                  if(!l.trim()) return null;
                  const r = parseLine(l);
                  if(r.length < 3) return null;
                  const num = (v) => { if(!v) return 0; let s=v.replace(/[^0-9.,-]/g,''); if(s.endsWith(',00')||s.endsWith('.00')) s=s.slice(0,-3); return Number(s.replace(/[.,]/g,'')) || 0; };
                  return {
                      name: r[idx.name] || 'Produk', sku: r[idx.sku] || '-', unit: r[idx.unit] || 'pcs',
                      hpp: num(r[idx.hpp]), eceran: num(r[idx.ecer]), grosir: num(r[idx.grosir]), partai: num(r[idx.partai])
                  };
              }).filter(p => p && p.name !== 'Produk');
              setProductList(products);

              // Fetch Category mapping by SKU
              try {
                  const resCat = await fetch(`${CATEGORY_DB_URL}&t=${Date.now()}`).catch(() => null);
                  if (!resCat || !resCat.ok) return;
                  const textCat = await resCat.text();
                  const linesCat = textCat.split('\n');
                  if(linesCat.length > 1) {
                      const headerCat = parseLine(linesCat[0]).map(v => v.toLowerCase().trim());
                      const idxCatSku = headerCat.findIndex(h => h === 'sku' || h.includes('sku') || h.includes('kode'));
                      const idxCatType = headerCat.findIndex(h => h === 'type' || h.includes('type') || h.includes('tipe'));
                      
                      if(idxCatSku !== -1 && idxCatType !== -1) {
                          const map = {};
                          const catSet = new Set();
                          linesCat.slice(1).forEach(l => {
                              if(!l.trim()) return;
                              const r = parseLine(l);
                              if(r.length > Math.max(idxCatSku, idxCatType)) {
                                  const skuStr = r[idxCatSku];
                                  const typeStr = r[idxCatType];
                                  if(skuStr && typeStr) {
                                      map[skuStr] = typeStr;
                                      catSet.add(typeStr);
                                  }
                              }
                          });
                          setSkuCategoryMap(map);
                          setCategories(Array.from(catSet).sort());
                      }
                  }
              } catch(errCat) { console.warn('Gagal memuat kategori:', errCat.message); }

            } catch(e) { console.warn('Gagal memuat produk:', e.message); } finally { setIsLoading(false); }
          }, []);

          const fetchHistoryData = useCallback(async () => {
            setIsLoadingHistory(true);
            try {
                const res = await fetch(`${APPS_SCRIPT_URL}?action=get&t=${Date.now()}`).catch(() => null);
                if(res && res.ok) {
                    const json = await res.json();
                    if(json.status === 'success' && Array.isArray(json.data)) {
                        const cleanData = json.data.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp)).map(d => ({
                            ...d, items: Array.isArray(d.items) ? d.items.filter(i => i) : [], revisions: d.revisions || {}
                        }));

                }
            } catch(e){ console.warn('Gagal memuat riwayat:', e.message); } finally { setIsLoadingHistory(false); }

          useEffect(() => { 
            if(isLoggedIn) { 
                if(productList.length === 0) fetchCsvData();

                fetchFeesData();

            } 
          }, [isLoggedIn, fetchCsvData, fetchHistoryData, fetchFeesData]);
          
          useEffect(() => { try { localStorage.setItem('marketplace_submissions', JSON.stringify(submissions)); } catch (e) {} }, [submissions]);

          // --- ACTIONS ---
          const handleProductChange = (e) => { 
              const { name, value } = e.target; 
              setProduct({ ...product, [name]: parseInput(value) }); 
          };
          
          const handleSelectProduct = (selectedProd) => { 
              setSelectedSku(selectedProd.sku); 
              setProduct({ 
                  hpp: selectedProd.hpp, 
                  basePrice: selectedProd.eceran 
              }); 
              setShowProductList(false); 
              setSearchTerm(''); 
          };
          
          const addToCart = () => {
              if (!selectedSku) return;

              const currentProcFee = (Number(fees.marketplaceProcessingFee) || 0) + (Number(fees.jubelioProcessingFee) || 0);
              const currentPackFee = Number(fees.packingFee) || 0;
              
              let finalCustomQty = null;
              if (showCustomQty && customQty > 1) {
                  finalCustomQty = customQty;
              }

              const prices = calculateItemPrices(product.hpp, margin, currentProcFee, currentPackFee, finalCustomQty, rounding);

              setCart([...cart, {
                  id: Date.now(), addedAt: new Date().toISOString(), sku: selectedSku,
                  name: selectedProductData?.name || 'Unknown', unit: selectedProductData?.unit || 'unit',

                  eceran: selectedProductData?.eceran || product.basePrice,
                  grosir: selectedProductData?.grosir || 0,
                  partai: selectedProductData?.partai || 0,

                  processingFee: currentProcFee,
                  packingFee: currentPackFee, // Save packing fee to item

                  priceMin3: prices.priceMin3,

              }]);
          };

          // --- FUNGSI BERSAMA UNTUK BATCH ADD ---
          const processBatchAdd = (productsArray, onSuccessCallback) => {

              const newItems = [];
              const margin = 10;
              const currentProcFee = (Number(fees.marketplaceProcessingFee) || 0) + (Number(fees.jubelioProcessingFee) || 0);

              productsArray.forEach((prod, index) => {

                      }

                      newItems.push({
                          id: Date.now() + index, 
                          addedAt: new Date().toISOString(), 
                          sku: prod.sku,
                          name: prod.name || 'Unknown', 
                          unit: prod.unit || 'unit',
                          hpp: prod.hpp, 
                          eceran: prod.eceran,
                          grosir: prod.grosir || 0,
                          partai: prod.partai || 0,
                          margin: margin,
                          processingFee: currentProcFee,
                          packingFee: currentPackFee,
                          sellingPrice: prices.sellingPrice,
                          priceMin3: prices.priceMin3, 
                          priceMin6: prices.priceMin6, 
                          priceMin12: prices.priceMin12, 
                          priceCustom: prices.priceCustom,

          // --- FUNGSI UNTUK ADD MULTIPLE PRODUCTS BY BRAND ---
          const handleBrandSearch = (term) => {
              setBrandSearchTerm(term);

                  setBrandSearchResults([]);

              }
              const lowerTerm = term.toLowerCase().trim();
              const results = productList.filter(p =>

                  String(p.sku).toLowerCase().includes(lowerTerm)
              );
              setBrandSearchResults(results);
          };

          const addBrandToCart = () => {
              processBatchAdd(brandSearchResults, () => {

          // --- FUNGSI UNTUK ADD MULTIPLE PRODUCTS BY CATEGORY ---

          const updateCartItem = (id, field, value) => {
              setCart(cart.map(item => {
                  if (item.id === id) {

                      const fee = updatedItem.processingFee || 0;
                      const packFee = updatedItem.packingFee || 0;
                      
                      const prices = calculateItemPrices(updatedItem.hpp, m, fee, packFee, item.customQtyValue, rounding);

                      return {
                          ...updatedItem,
                          processingFee: field === 'processingFee' ? (value === '' ? '' : Number(value)) : updatedItem.processingFee,

                      ...item,
                      sellingPrice: prices.sellingPrice,
                      priceMin3: prices.priceMin3,
                      priceMin6: prices.priceMin6,
                      priceMin12: prices.priceMin12,
                      priceCustom: prices.priceCustom
                  };
              }));
          };

          const applyMassUpdate = () => {

                      priceMin3: prices.priceMin3,
                      priceMin6: prices.priceMin6,
                      priceMin12: prices.priceMin12,
                      priceCustom: prices.priceCustom

              setMassFee('');

                      body: JSON.stringify({
                          action: 'updateFees',

          const addToCompetitorCart = () => {
            if (!selectedSku || !compForm.compAName || !compForm.compAPrice) { showNotif('Isi Nama & Harga Kompetitor A!'); return; }

                itemStatus: 'pending', isCompetitorData: true,

          const removeCartItem = (id) => setCart(cart.filter(item => item.id !== id));

              const payload = {
                  id: subId, sender: currentUser, timestamp: new Date().toISOString(), status: 'pending', isRead: false,

                  serverNote: '', revisions: { _clientNote: submissionNote }, clientNote: submissionNote
              };
              try {
                  await fetch(APPS_SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ action: isEditing ? 'update' : 'add', payload }) });
                  setSubmissions(prev => {
                      const exists = prev.find(i => i.id === subId);
                      if (exists && !isEditing) return prev;
                      return isEditing ? prev.map(p => p.id === subId ? {...p, ...payload} : p) : [payload, ...prev];
                  });
                  if(type === 'competitor') setCompetitorCart([]); else setCart([]);

                  showNotif('Berhasil dikirim!');
                  setTimeout(fetchHistoryData, 2000);
              } catch(e){ showNotif('Gagal kirim'); } finally { setIsSending(false); }
          };

          const handleUpdateStatus = async (id, globalStatus) => {
            const draft = serverDrafts[id] || { note: '', revisions: {}, checkedItems: {} };
            const currentSub = submissions.find(s => s.id === id);
            if (!currentSub) return;
            let updatedItems = [];
            if (globalStatus === 'pending' || globalStatus === 'revision') {
                 updatedItems = (currentSub.items || []).map(item => ({ ...item, itemStatus: globalStatus }));
            } else {
                updatedItems = (currentSub.items || []).map(item => ({
                    ...item, itemStatus: globalStatus === 'reviewed' ? (draft.checkedItems?.[item.sku] ? 'approved' : 'rejected') : globalStatus 
                }));
            }
            const finalStatus = globalStatus === 'reviewed' ? 'completed' : globalStatus;
            const payload = { id: id, status: finalStatus, handledAt: new Date().toISOString(), serverNote: draft.note, revisions: { ...currentSub.revisions, ...draft.revisions }, items: updatedItems, isRead: true };
            setSubmissions(prev => prev.map(sub => sub.id === id ? { ...sub, ...payload } : sub));
            fetch(APPS_SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ action: 'update', payload }) }).catch(e => {});
            const newDrafts = { ...serverDrafts }; delete newDrafts[id]; setServerDrafts(newDrafts);
          };

          const handleServerDraftChange = (subId, field, val, sku) => {
            setServerDrafts(prev => {
                const d = prev[subId] || { note: '', revisions: {}, checkedItems: {} };
                if(field === 'note') return { ...prev, [subId]: { ...d, note: val } };
                if(field === 'revision') return { ...prev, [subId]: { ...d, revisions: { ...d.revisions, [sku]: val } } };
                if(field === 'check') {
                    const c = { ...d.checkedItems }; if(c[sku]) delete c[sku]; else c[sku] = true;
                    return { ...prev, [subId]: { ...d, checkedItems: c } };
                }
                return prev;
            });
          };

          const handleToggleExpand = (id) => {
              if (expandedSubmissionId === id) setExpandedSubmissionId(null);
              else { setExpandedSubmissionId(id); if (isServer) handleMarkAsRead(id); }

          const handleMarkAsRead = (id) => {
             const sub = submissions.find(s => s.id === id);
             if (sub && !sub.isRead) {
                setSubmissions(prev => prev.map(s => s.id === id ? { ...s, isRead: true } : s));
                fetch(APPS_SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ action: 'markRead', payload: { id: id } }) }).catch(e => {});
             }
          };

          const handleRefreshSubmissions = async () => { setIsRefreshing(true); await fetchHistoryData(); setIsRefreshing(false); };
          
          const downloadCSV = (targetData, isComp = false) => {
              const today = new Date();
              const dd = String(today.getDate()).padStart(2, '0');
              const mm = String(today.getMonth() + 1).padStart(2, '0');
              const yyyy = today.getFullYear();
              const csvFileName = `Update Harga (${dd}-${mm}-${yyyy}).csv`;

              const escapeCSV = (val) => {
                  if (val === null || val === undefined) return '""';
                  const str = String(val);
                  const noNewlines = str.replace(/[\r\n]+/g, ' ');
                  return `"${noNewlines.replace(/"/g, '""')}"`;
              };

              const formatSKU = (sku) => {
                  if (!sku) return '""';
                  const cleanSku = String(sku).replace(/[\r\n]+/g, ' ').replace(/"/g, '""');
                  return `"=""${cleanSku}"""`; 
              };

              let hdr = [];
              if (isComp) {
                  hdr = ["Tgl","SKU","Nama","HPP","Eceran","Grosir","Partai","Harga Kita","KompA","HargaA","LinkA","KompB","HargaB","LinkB"].map(escapeCSV);
              } else {
                  const h = ["Tgl","SKU","Nama"];
                  if (canSeeHPP) h.push("HPP");
                  h.push("Eceran","Grosir","Partai","Margin","Biaya Layanan","Biaya Packing","Tayang (Sat)","Min 3","Min 6","Min 12","Custom Min","Harga Custom");
                  hdr = h.map(escapeCSV);
              }
              
              const row = isComp

                      formatSKU(d.sku),

                      escapeCSV(d.eceran),
                      escapeCSV(d.grosir),
                      escapeCSV(d.partai),
                      escapeCSV(d.ownPrice), 
                      escapeCSV(d.compAName), 
                      escapeCSV(d.compAPrice), 
                      escapeCSV(d.compALink),
                      escapeCSV(d.compBName), 
                      escapeCSV(d.compBPrice || ''), 
                      escapeCSV(d.compBLink)
                    ]) 
                  : targetData.map(d=>{
                      const r = [escapeCSV(d.addedAt), formatSKU(d.sku), escapeCSV(d.name)];

                          escapeCSV(d.eceran),

                      );
                      return r;

          const downloadJubelioCSV = (targetData) => {

              const csvFileName = `Jubelio_Update_Harga_${dd}-${mm}-${yyyy}.csv`;

              const toRawCSV = (val) => {
                  if (val === null || val === undefined) return '';
                  const str = String(val).replace(/[\r\n]+/g, ' ');
                  if (str.includes(',') || str.includes('"')) {
                      return `"${str.replace(/"/g, '""')}"`;

                  return str;

              ].map(toRawCSV);
              
              const row = targetData.map(d => {

                  return [
                      sku,
                      price,
                      price,
                      price,
                      price,
                      price
                  ];
              });

              const csv = [hdr.join(','), ...row.map(r=>r.join(','))].join('\n');
              // Tidak memakai BOM \uFEFF agar lebih sesuai dengan raw parser standard
              const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});

          const downloadHistoryDB = (data) => {

                return item.status === pendingFilter;
          });

                if (completedFilter === 'all') return true;
                if (completedFilter === 'approved') return ['completed', 'approved'].includes(item.status);

          });

          const paginatedCompleted = filteredCompleted.slice((completedPage - 1) * ITEMS_PER_PAGE, completedPage * ITEMS_PER_PAGE);

              return list.reduce((acc, item) => {
                const sender = (item.sender || 'Unknown').toLowerCase();
                if (!acc[sender]) acc[sender] = [];
                acc[sender].push(item);
                return acc;
              }, {});
          };

          const groupedPending = groupBySender(paginatedPending);
          const pendingSenders = Object.keys(groupedPending).sort();
          const groupedCompleted = groupBySender(paginatedCompleted);
          const completedSenders = Object.keys(groupedCompleted).sort();

          // --- MAIN RENDER ---
          if (!isLoggedIn) {

                      <div className="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden animate-in zoom-in-95">
                          <div className="p-4 border-b border-slate-200 flex justify-between items-center bg-slate-50">
                              <h3 className="font-bold text-slate-800 flex items-center"><Settings className="w-5 h-5 mr-2 text-slate-600"/> Pengaturan Biaya Marketplace</h3>

                                      <label className="block text-[10px] font-bold text-slate-700 mb-1">Biaya Administrasi (%)</label>
