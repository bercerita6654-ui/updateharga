                                  </div>
                                  <div>
                                      <label className="block text-[10px] font-bold text-slate-700 mb-1">Layanan Promo XTRA (%)</label>
                                      <input type="number" step="0.1" className="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500" value={fees.layananXtra} onChange={e => setFees({...fees, layananXtra: Number(e.target.value)})} />
                                  </div>
                                  <div>
                                      <label className="block text-[10px] font-bold text-slate-700 mb-1">Premi / Asuransi (%)</label>
                                      <input type="number" step="0.1" className="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500" value={fees.insurance} onChange={e => setFees({...fees, insurance: Number(e.target.value)})} />
                                  </div>
                                  <div>
                                      <label className="block text-[10px] font-bold text-slate-700 mb-1">Komisi AMS (%)</label>
                                      <input type="number" step="0.1" className="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500" value={fees.komisiAMS} onChange={e => setFees({...fees, komisiAMS: Number(e.target.value)})} />
                                  </div>
                                  <div>
                                      <label className="block text-[10px] font-bold text-slate-700 mb-1">Proses MARKETPLACE (Rp)</label>
                                      <input type="number" className="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500" value={fees.marketplaceProcessingFee} onChange={e => setFees({...fees, marketplaceProcessingFee: Number(e.target.value)})} />
                                  </div>
                                  <div>
                                      <label className="block text-[10px] font-bold text-slate-700 mb-1">Proses JUBELIO (Rp)</label>
                                      <input type="number" className="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500" value={fees.jubelioProcessingFee} onChange={e => setFees({...fees, jubelioProcessingFee: Number(e.target.value)})} />
                                  </div>
                                  <div>
                                      <label className="block text-[10px] font-bold text-slate-700 mb-1">Biaya Packing (Rp)</label>
                                      <input type="number" className="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500" value={fees.packingFee} onChange={e => setFees({...fees, packingFee: Number(e.target.value)})} />
                                  </div>
                              </div>
                          </div>
                          <div className="p-4 border-t border-slate-200 bg-slate-50 flex justify-end gap-2">
                              <button onClick={() => setShowSettings(false)} className="px-4 py-2 text-xs font-bold text-slate-600 hover:bg-slate-200 rounded-lg">Batal</button>
                              <button onClick={handleSaveFees} disabled={isSavingFees} className="px-4 py-2 text-xs font-bold bg-blue-600 text-white hover:bg-blue-700 rounded-lg flex items-center">
                                  {isSavingFees ? <RefreshCw className="w-4 h-4 mr-1 animate-spin" /> : <Save className="w-4 h-4 mr-1"/>} 
                                  Simpan ke Database
                              </button>
                          </div>
                      </div>
                  </div>
              )}

              <div className="max-w-7xl mx-auto space-y-6">
                 <header className="flex flex-col md:flex-row justify-between items-center pb-4 border-b border-slate-200 gap-4">
                     <div className="flex items-center space-x-3"><div className="bg-blue-600 p-2 rounded-lg"><Calculator className="text-white w-6 h-6" /></div><div><h1 className="text-xl font-bold">MarpApps Pricing</h1><div className="text-xs text-slate-500 capitalize">User: {currentUser} | {isOnline ? 'Online' : 'Offline'}</div></div></div>
                     <div className="flex gap-2">
                        <button onClick={() => setActiveView('calculator')} className={`px-4 py-2 text-xs font-bold rounded ${activeView === 'calculator' ? 'bg-white shadow' : ''}`}>Kalkulator</button>
                        <button onClick={() => setActiveView('competitor')} className={`px-4 py-2 text-xs font-bold rounded ${activeView === 'competitor' ? 'bg-white shadow' : ''}`}>Kompetitor</button>
                        <button onClick={() => setActiveView(isServer ? 'inbox' : 'history')} className={`px-4 py-2 text-xs font-bold rounded ${activeView === 'inbox' || activeView === 'history' ? 'bg-white shadow' : ''} flex items-center`}>{isServer ? 'Inbox' : 'Riwayat'} {pendingList.length > 0 && <span className="ml-1 bg-red-500 text-white px-1.5 rounded-full">{pendingList.length}</span>}</button>
                        {isAdmin && <button onClick={() => setShowSettings(true)} className="px-3 text-slate-500 hover:text-slate-800" title="Pengaturan Biaya"><Settings className="w-4 h-4"/></button>}
                        <button onClick={() => { setIsLoggedIn(false); setCurrentUser(null); localStorage.removeItem('marketplace_submissions'); }} className="text-red-500 text-xs font-bold px-3"><LogOut className="w-4 h-4"/></button>
                     </div>
                 </header>

                 {/* MODAL ADD BY BRAND */}
                 {showAddBrandModal && (
                     <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/50 p-4">
                         <div className="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden animate-in zoom-in-95">
                             <div className="p-4 border-b border-slate-200 flex justify-between items-center bg-slate-50">
                                 <h3 className="font-bold text-slate-800 flex items-center"><Search className="w-5 h-5 mr-2 text-blue-600"/> Tambah Banyak (By Merk/Kata Kunci)</h3>
                                 <button onClick={() => {setShowAddBrandModal(false); setBrandSearchTerm(''); setBrandSearchResults([]);}} className="text-slate-400 hover:text-slate-600 p-1"><X className="w-5 h-5"/></button>
                             </div>
                             <div className="p-5 space-y-4">
                                 <div>
                                     <label className="block text-xs font-bold text-slate-700 mb-1">Cari Merk / Kata Kunci Produk</label>
                                     <input 
                                         type="text" 
                                         autoFocus
                                         className="w-full p-2.5 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none" 
                                         placeholder="Contoh: 'Tepung', 'Bimoli', 'Indomie'..." 
                                         value={brandSearchTerm}
                                         onChange={(e) => handleBrandSearch(e.target.value)}
                                     />
                                 </div>
                                 
                                 <div className="border rounded-lg bg-slate-50 p-2 max-h-48 overflow-y-auto">
                                     {brandSearchTerm.trim() === '' ? (
                                         <div className="text-xs text-center text-slate-400 py-4">Ketik kata kunci untuk mencari produk</div>
                                     ) : brandSearchResults.length === 0 ? (
                                         <div className="text-xs text-center text-slate-500 py-4">Tidak ada produk yang cocok dengan "{brandSearchTerm}"</div>
                                     ) : (
                                         <div className="space-y-1">
                                             <div className="text-[10px] font-bold text-blue-600 mb-2 px-1 border-b border-blue-100 pb-1">Ditemukan {brandSearchResults.length} produk:</div>
                                             {brandSearchResults.slice(0, 100).map((p, i) => (
                                                 <div key={i} className="text-[10px] p-1.5 bg-white border border-slate-100 rounded truncate flex justify-between items-center">
                                                     <span className="truncate pr-2">{p.name}</span>
                                                     <span className="text-slate-400 font-mono flex-shrink-0">{p.sku}</span>
                                                  </div>
                                             ))}
                                             {brandSearchResults.length > 100 && (
                                                 <div className="text-[10px] text-center text-slate-400 pt-1 italic">...dan {brandSearchResults.length - 100} produk lainnya</div>
                                             )}
                                         </div>
                                     )}
                                 </div>
                             </div>
                             <div className="p-4 border-t border-slate-200 bg-slate-50 flex justify-end gap-2">
                                 <button onClick={() => setShowAddBrandModal(false)} className="px-4 py-2 text-xs font-bold text-slate-600 hover:bg-slate-200 rounded-lg transition-colors">Batal</button>
                                 <button 
                                     onClick={addBrandToCart} 
                                     disabled={brandSearchResults.length === 0}
                                     className="px-4 py-2 text-xs font-bold bg-blue-600 text-white hover:bg-blue-700 rounded-lg transition-colors disabled:opacity-50 flex items-center shadow-sm"
                                 >
                                     <Plus className="w-4 h-4 mr-1"/> Tambahkan Semua ({brandSearchResults.length}) ke Daftar
                                 </button>
                             </div>
                         </div>
                     </div>
                 )}

                 {/* MODAL ADD BY CATEGORY */}
                 {showAddCategoryModal && (
                     <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/50 p-4">
                         <div className="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden animate-in zoom-in-95">
                             <div className="p-4 border-b border-slate-200 flex justify-between items-center bg-slate-50">
                                 <h3 className="font-bold text-slate-800 flex items-center"><Tag className="w-5 h-5 mr-2 text-purple-600"/> Tambah Banyak (By Kategori/Type)</h3>
                                 <button onClick={() => {setShowAddCategoryModal(false); setSelectedCategory(''); setCategorySearchResults([]);}} className="text-slate-400 hover:text-slate-600 p-1"><X className="w-5 h-5"/></button>
                             </div>
                             <div className="p-5 space-y-4">
                                 <div>
                                     <label className="block text-xs font-bold text-slate-700 mb-1">Pilih Kategori Produk</label>
                                     <select 
                                         className="w-full p-2.5 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-purple-500 focus:outline-none bg-white cursor-pointer"
                                         value={selectedCategory}
                                         onChange={(e) => handleCategorySelect(e.target.value)}
                                     >
                                         <option value="">-- Pilih Kategori --</option>
                                         {categories.map((cat, i) => (
                                             <option key={i} value={cat}>{cat}</option>
                                         ))}
                                     </select>
                                 </div>
                                 
                                 <div className="border rounded-lg bg-slate-50 p-2 max-h-48 overflow-y-auto">
                                     {selectedCategory === '' ? (
                                         <div className="text-xs text-center text-slate-400 py-4">Silakan pilih kategori di atas</div>
                                     ) : categorySearchResults.length === 0 ? (
                                         <div className="text-xs text-center text-slate-500 py-4">Tidak ada produk dalam kategori "{selectedCategory}"</div>
                                     ) : (
                                         <div className="space-y-1">
                                             <div className="text-[10px] font-bold text-purple-600 mb-2 px-1 border-b border-purple-100 pb-1">Ditemukan {categorySearchResults.length} produk di {selectedCategory}:</div>
                                             {categorySearchResults.slice(0, 100).map((p, i) => (
                                                 <div key={i} className="text-[10px] p-1.5 bg-white border border-slate-100 rounded truncate flex justify-between items-center">
                                                     <span className="truncate pr-2">{p.name}</span>
                                                     <span className="text-slate-400 font-mono flex-shrink-0">{p.sku}</span>
                                                 </div>
                                             ))}
                                             {categorySearchResults.length > 100 && (
                                                 <div className="text-[10px] text-center text-slate-400 pt-1 italic">...dan {categorySearchResults.length - 100} produk lainnya</div>
                                             )}
                                         </div>
                                     )}
                                 </div>
                             </div>
                             <div className="p-4 border-t border-slate-200 bg-slate-50 flex justify-end gap-2">
                                 <button onClick={() => setShowAddCategoryModal(false)} className="px-4 py-2 text-xs font-bold text-slate-600 hover:bg-slate-200 rounded-lg transition-colors">Batal</button>
                                 <button 
                                     onClick={addCategoryToCart} 
                                     disabled={categorySearchResults.length === 0}
                                     className="px-4 py-2 text-xs font-bold bg-purple-600 text-white hover:bg-purple-700 rounded-lg transition-colors disabled:opacity-50 flex items-center shadow-sm"
                                 >
                                     <Plus className="w-4 h-4 mr-1"/> Tambahkan Semua ({categorySearchResults.length})
                                 </button>
                             </div>
                         </div>
                     </div>
                 )}

                 {activeView === 'calculator' && (
                     <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                         <div className="lg:col-span-1 space-y-6">
                             <Card className="p-5">
                                 <div className="flex justify-between mb-4">
                                     <h3 className="font-bold flex items-center"><Database className="w-4 h-4 mr-2"/> Produk</h3>
                                     <div className="flex items-center gap-1.5 flex-wrap justify-end">
                                         <button 
                                             onClick={() => setShowAddCategoryModal(true)}
                                             className="text-[10px] font-bold bg-purple-100 text-purple-700 hover:bg-purple-200 px-2 py-1 rounded flex items-center transition-colors border border-purple-200"
                                             title="Tambah banyak produk berdasarkan Kategori/Type"
                                         >
                                             <Tag className="w-3 h-3 mr-0.5"/> Add Cat
                                         </button>
                                         <button 
                                             onClick={() => setShowAddBrandModal(true)}
                                             className="text-[10px] font-bold bg-blue-100 text-blue-700 hover:bg-blue-200 px-2 py-1 rounded flex items-center transition-colors border border-blue-200"
                                             title="Tambah banyak produk sekaligus berdasarkan Merk/Kata Kunci"
                                         >
                                             <Plus className="w-3 h-3 mr-0.5"/> Add Brand
                                         </button>
                                         <RefreshCw className={`w-4 h-4 ml-1 cursor-pointer text-slate-400 hover:text-slate-600 ${isLoading?'animate-spin':''}`} onClick={fetchCsvData}/>
                                     </div>
                                 </div>
                                 <div className="relative mb-4">
                                     <div className="p-2 border rounded cursor-pointer flex justify-between items-center bg-white hover:border-blue-400 transition-colors" onClick={() => { if (showProductList) setMultiSelectedSkus([]); setShowProductList(!showProductList); }}>
                                         <span className="truncate text-sm font-medium">{selectedSku ? `${selectedSku} - ${selectedProductData?.name}` : 'Pilih Produk...'}</span>
                                         <ChevronDown className="w-4 h-4 text-slate-400"/>
                                     </div>
                                     {showProductList && (
                                         <div className="absolute z-50 w-full bg-white border border-slate-200 rounded-lg shadow-xl max-h-[400px] overflow-y-auto mt-1 flex flex-col">
                                             <div className="p-3 sticky top-0 bg-slate-50 border-b shadow-sm z-10 flex flex-col gap-2">
                                                 <div className="flex gap-2">
                                                     <div className="relative flex-1">
                                                         <Search className="w-4 h-4 absolute left-2 top-2.5 text-slate-400" />
                                                         <input autoFocus type="text" className="w-full p-2 pl-8 border border-slate-300 rounded text-xs focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="Cari lalu tekan Enter..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} onKeyDown={(e) => {
                                                             if(e.key === 'Enter'){
                                                                 e.preventDefault();
                                                                 const newSkus = filteredProducts.map(p => p.sku);
                                                                 setMultiSelectedSkus(prev => [...new Set([...prev, ...newSkus])]);
                                                             }
                                                         }} />
                                                     </div>
                                                     <button onClick={(e) => {
                                                         e.stopPropagation();
                                                         const newSkus = filteredProducts.map(p => p.sku);
                                                         setMultiSelectedSkus(prev => [...new Set([...prev, ...newSkus])]);
                                                     }} className="bg-indigo-100 text-indigo-700 hover:bg-indigo-200 px-3 py-1.5 rounded text-[10px] font-bold transition-colors flex items-center whitespace-nowrap">
                                                         <CheckSquare className="w-3 h-3 mr-1" /> Pilih Hasil
                                                     </button>
                                                 </div>
                                                 
                                                 <div className="flex justify-between items-center px-1">
                                                     <label className="flex items-center gap-2 cursor-pointer" onClick={e => e.stopPropagation()}>
                                                         <input 
                                                             type="checkbox" 
                                                             className="w-4 h-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500 cursor-pointer"
                                                             checked={filteredProducts.length > 0 && filteredProducts.every(p => multiSelectedSkus.includes(p.sku))}
                                                             onChange={(e) => {
                                                                 if (e.target.checked) {
                                                                     // Tambahkan semua SKU dari hasil pencarian saat ini
                                                                     const newSkus = filteredProducts.map(p => p.sku).filter(sku => !multiSelectedSkus.includes(sku));
                                                                     setMultiSelectedSkus([...multiSelectedSkus, ...newSkus]);
                                                                 } else {
                                                                     // Hapus semua SKU yang ada di hasil pencarian saat ini dari pilihan
                                                                     const filteredSkus = filteredProducts.map(p => p.sku);
                                                                     setMultiSelectedSkus(multiSelectedSkus.filter(sku => !filteredSkus.includes(sku)));
                                                                 }
                                                             }}
                                                         />
                                                         <span className="text-xs font-bold text-slate-700">Pilih Semua ({filteredProducts.length} Produk)</span>
                                                     </label>
                                                 </div>

                                                 {multiSelectedSkus.length > 0 && (
                                                     <button 
                                                         onClick={(e) => {
                                                             e.stopPropagation();
                                                             const toAdd = productList.filter(p => multiSelectedSkus.includes(p.sku));
                                                             processBatchAdd(toAdd, () => {
                                                                 setMultiSelectedSkus([]);
                                                                 setShowProductList(false);
                                                                 setSearchTerm('');
                                                             });
                                                         }}
                                                         className="w-full bg-green-600 text-white text-xs font-bold py-2 rounded flex justify-center items-center hover:bg-green-700 shadow-sm"
                                                     >
                                                         <Plus className="w-4 h-4 mr-1"/> Tambahkan {multiSelectedSkus.length} Produk Terpilih
                                                     </button>
                                                 )}
                                             </div>
                                             <div>
                                                 {filteredProducts.slice(0, 50).map((p, i) => (
                                                     <div key={i} className="p-3 text-xs hover:bg-blue-50 border-b last:border-0 border-slate-100 transition-colors flex items-center gap-3">
                                                         <div className="flex-shrink-0" onClick={(e) => e.stopPropagation()}>
                                                             <input 
                                                                 type="checkbox" 
                                                                 className="w-4 h-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500 cursor-pointer"
                                                                 checked={multiSelectedSkus.includes(p.sku)}
                                                                 onChange={(e) => {
                                                                     setMultiSelectedSkus(prev => prev.includes(p.sku) ? prev.filter(s => s !== p.sku) : [...prev, p.sku]);
                                                                 }}
                                                             />
                                                         </div>
                                                         <div className="flex-1 cursor-pointer" onClick={() => handleSelectProduct(p)}>
                                                             <div className="font-bold text-slate-800">{p.name}</div>
                                                             <div className="text-slate-500 flex justify-between mt-1">
                                                                 <span>{p.sku}</span>
                                                                 <span className="font-medium text-blue-600">Ecer: {formatIDR(p.eceran)}</span>
                                                             </div>
                                                         </div>
                                                     </div>
                                                 ))}
                                             </div>
                                         </div>
                                     )}
                                 </div>

                                 {/* INFO HARGA REFERENSI */}
                                 {selectedSku && selectedProductData && (
                                     <div className="mb-4 p-3 bg-slate-50 rounded-lg border border-slate-200 text-xs space-y-1.5">
                                         <div className="font-semibold text-slate-700 mb-2 border-b pb-1">Harga di sistem AIO:</div>
                                         <div className="flex justify-between"><span className="text-slate-500">Eceran:</span> <span className="font-medium text-blue-600">{formatIDR(selectedProductData.eceran)}<span className="font-normal text-[10px] text-blue-400">{productUnit}</span></span></div>
                                         <div className="flex justify-between"><span className="text-slate-500">Grosir:</span> <span className="font-medium text-orange-600">{formatIDR(selectedProductData.grosir)}<span className="font-normal text-[10px] text-orange-400">{productUnit}</span></span></div>
                                         <div className="flex justify-between"><span className="text-slate-500">Partai:</span> <span className="font-medium text-purple-600">{formatIDR(selectedProductData.partai)}<span className="font-normal text-[10px] text-purple-400">{productUnit}</span></span></div>
                                         {canSeeHPP && (
                                             <div className="flex justify-between"><span className="text-slate-500">HPP Asli:</span> <span className="font-medium text-slate-700">{formatIDR(selectedProductData.hpp)}<span className="font-normal text-[10px] text-slate-500">{productUnit}</span></span></div>
                                         )}
                                     </div>
                                 )}

                                 <div className="space-y-3 pt-3 border-t">
                                     {canSeeHPP && (
                                         <div>
                                             <label className="text-xs font-bold block mb-1 text-slate-700">HPP / Modal (Bisa Diedit)</label>
                                             <div className="relative">
                                                 <span className="absolute left-3 top-2.5 text-slate-500 text-sm font-bold">Rp</span>
                                                 <input 
                                                     type="text" 
                                                     name="hpp"
                                                     inputMode="numeric"
                                                     className="w-full p-2 pl-8 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none font-bold text-slate-800" 
                                                     value={formatInput(product.hpp)} 
                                                     onChange={handleProductChange} 
                                                 />
                                             </div>
                                             {selectedProductData && (
                                                 <div className="flex flex-wrap gap-1.5 mt-2 items-center">
                                                     <span className="text-[10px] text-slate-500">Acuan:</span>
                                                     <button onClick={() => setProduct(p => ({...p, hpp: selectedProductData.hpp || 0}))} className="px-2 py-0.5 bg-slate-100 hover:bg-slate-200 border border-slate-200 rounded text-[9px] font-bold text-slate-700 transition-colors">HPP Asli</button>
                                                     <button onClick={() => setProduct(p => ({...p, hpp: selectedProductData.eceran || 0}))} className="px-2 py-0.5 bg-blue-50 hover:bg-blue-100 border border-blue-200 rounded text-[9px] font-bold text-blue-700 transition-colors">Eceran</button>
                                                     <button onClick={() => setProduct(p => ({...p, hpp: selectedProductData.grosir || 0}))} className="px-2 py-0.5 bg-orange-50 hover:bg-orange-100 border border-orange-200 rounded text-[9px] font-bold text-orange-700 transition-colors">Grosir</button>
                                                     <button onClick={() => setProduct(p => ({...p, hpp: selectedProductData.partai || 0}))} className="px-2 py-0.5 bg-purple-50 hover:bg-purple-100 border border-purple-200 rounded text-[9px] font-bold text-purple-700 transition-colors">Partai</button>
                                                 </div>
                                             )}
                                             <p className="text-[9px] text-slate-400 mt-1.5 italic">*Pilih acuan di atas atau edit angka manual untuk mengubah perhitungan sementara.</p>
                                         </div>
                                     )}
                                     
                                     <div className="bg-slate-100 border border-slate-200 rounded-lg p-3 mt-4">
                                         <div className="flex justify-between items-center mb-2 border-b border-slate-200 pb-2">
                                             <h4 className="text-[11px] font-bold text-slate-700">Rincian Biaya Marketplace</h4>
                                             {isAdmin && <button onClick={() => setShowSettings(true)} className="text-[10px] text-blue-600 hover:text-blue-800 font-bold flex items-center" title="Simpan sebagai nilai default ke Spreadsheet"><Settings className="w-3 h-3 mr-1"/> Simpan Default</button>}
                                         </div>
                                         
                                         <div className="grid grid-cols-4 gap-2 mb-2">
                                             <div>
                                                 <label className="text-[8px] font-bold block mb-1 text-slate-600">Admin (%)</label>
                                                 <input type="number" step="0.1" className="w-full p-1.5 border rounded text-[10px] focus:ring-1 focus:ring-blue-500 focus:outline-none text-center" value={fees.adminFee} onChange={e => setFees({...fees, adminFee: e.target.value})} onBlur={e => setFees({...fees, adminFee: Number(e.target.value) || 0})} />

                                                             onChange={(e) => updateCartItem(c.id, 'packingFee', e.target.value)}
                                                             onBlur={(e) => updateCartItem(c.id, 'packingFee', Number(e.target.value) || 0)}
                                                             className="w-12 p-1 text-xs border border-blue-200 rounded font-bold text-blue-700 bg-blue-50 focus:outline-none focus:ring-1 focus:ring-blue-500 text-center"
                                                         />
                                                     </td>
                                                     <td className="p-2 text-right font-medium bg-blue-50/30 cursor-pointer hover:bg-blue-100/50 transition-colors group" onClick={(e) => handleCopyPrice(c.sellingPrice, e)}>
                                                         <div className="flex justify-end items-center gap-1">
                                                             {formatIDR(c.sellingPrice)}
                                                             <Copy className="w-3 h-3 text-blue-400 opacity-0 group-hover:opacity-100" />
                                                         </div>
                                                     </td>
                                                     <td className="p-2 text-right text-green-700 cursor-pointer hover:bg-green-50 transition-colors group" onClick={(e) => handleCopyPrice(c.priceMin3, e)}>
                                                         <div className="flex justify-end items-center gap-1">
                                                             {formatIDR(c.priceMin3)}
                                                             <Copy className="w-3 h-3 text-green-400 opacity-0 group-hover:opacity-100" />
                                                         </div>
                                                     </td>
                                                     <td className="p-2 text-right text-green-700 cursor-pointer hover:bg-green-50 transition-colors group" onClick={(e) => handleCopyPrice(c.priceMin6, e)}>
                                                         <div className="flex justify-end items-center gap-1">
                                                             {formatIDR(c.priceMin6)}
                                                             <Copy className="w-3 h-3 text-green-400 opacity-0 group-hover:opacity-100" />
                                                         </div>
                                                     </td>
                                                     <td className="p-2 text-right text-green-700 cursor-pointer hover:bg-green-50 transition-colors group" onClick={(e) => handleCopyPrice(c.priceMin12, e)}>
                                                         <div className="flex justify-end items-center gap-1">
                                                             {formatIDR(c.priceMin12)}
                                                             <Copy className="w-3 h-3 text-green-400 opacity-0 group-hover:opacity-100" />
                                                         </div>
                                                     </td>
                                                     <td className="p-2 text-right text-green-700 cursor-pointer hover:bg-green-50 transition-colors group" onClick={(e) => { if(c.customQtyValue) handleCopyPrice(c.priceCustom, e); }}>
                                                         {c.customQtyValue ? (
                                                             <div className="flex justify-end items-center gap-1">
                                                                 <div className="text-right">
                                                                     <div>{formatIDR(c.priceCustom)}</div>
                                                                     <div className="text-[9px] text-green-700 opacity-80">Min: {c.customQtyValue}</div>
                                                                 </div>
                                                                 <Copy className="w-3 h-3 text-green-400 opacity-0 group-hover:opacity-100" />
                                                             </div>
                                                         ) : '-'}
                                                     </td>
                                                     <td className="p-2 text-center sticky right-0 bg-white shadow-[-4px_0_6px_-2px_rgba(0,0,0,0.05)]">
                                                         <button onClick={()=>setCart(cart.filter(x=>x.id!==c.id))} className="text-red-500 hover:bg-red-50 p-1.5 rounded transition-colors"><Trash2 className="w-3.5 h-3.5 mx-auto"/></button>
                                                     </td>
                                                 </tr>
                                             ))}
                                         </tbody>
                                     </table>
                                 </div>
                                 
                                 {/* PAGINATION CONTROLS FOR CART */}
                                 {totalCartPages > 1 && (
                                     <div className="flex justify-center items-center p-3 border-t bg-slate-50 gap-4">
                                         <button 
                                             onClick={() => setCartPage(p => Math.max(1, p - 1))} 
                                             disabled={currentCartPage === 1} 
                                             className="p-1 rounded-md hover:bg-slate-200 disabled:opacity-30 flex items-center transition-colors text-slate-600"
                                         >
                                             <ChevronLeft className="w-4 h-4"/>
                                         </button>
                                         <span className="text-[10px] text-slate-600 font-bold">Hal {currentCartPage} dari {totalCartPages}</span>
                                         <button 
                                             onClick={() => setCartPage(p => Math.min(totalCartPages, p + 1))} 
                                             disabled={currentCartPage === totalCartPages} 
                                             className="p-1 rounded-md hover:bg-slate-200 disabled:opacity-30 flex items-center transition-colors text-slate-600"
                                         >
                                             <ChevronRight className="w-4 h-4"/>
                                         </button>
                                     </div>
                                 )}

                                 <div className="p-2 text-[9px] text-slate-400 italic bg-slate-50 border-t">*Klik pada harga manapun di tabel ini untuk meng-copy nilainya.</div>
                                 {cart.length > 0 && isAdmin && <div className="p-3 bg-slate-50 border-t"><textarea className="w-full p-2 text-xs border rounded" placeholder="Catatan opsional..." value={submissionNote} onChange={e=>setSubmissionNote(e.target.value)}></textarea></div>}
                             </Card>
                         </div>
                     </div>
                 )}

                 {activeView === 'competitor' && (
                     <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                         <div className="lg:col-span-1 space-y-6">
                                <Card className="p-5 relative flex flex-col h-full">
                                    <div className="flex justify-between items-center mb-4"><h3 className="font-semibold flex items-center text-slate-700"><Database className="w-4 h-4 mr-2 text-blue-500" /> Pilih Produk</h3><button onClick={fetchCsvData} disabled={isLoading} className="p-1.5 hover:bg-slate-100 rounded-full transition-colors text-slate-500 hover:text-blue-600 disabled:opacity-50"><RefreshCw className={`w-4 h-4 ${isLoading ? 'animate-spin' : ''}`} /></button></div>
                                    <div className="relative mb-4">
                                        <div className="flex items-center justify-between w-full p-2.5 border border-slate-300 rounded-lg text-sm bg-white cursor-pointer hover:border-blue-400 hover:shadow-sm transition-all group" onClick={() => { if (showProductList) setMultiSelectedSkus([]); setShowProductList(!showProductList); }}><span className={`truncate font-medium flex-1 mr-2 ${selectedSku ? 'text-slate-800' : 'text-slate-400'}`}>{selectedSku ? `${selectedSku} - ${selectedProductData?.name}` : 'Pilih Produk...'}</span><ChevronDown className="w-4 h-4 text-slate-400 group-hover:text-blue-500" /></div>
                                        {showProductList && (<div className="absolute z-50 top-full left-0 right-0 md:right-auto md:w-[150%] lg:w-[180%] mt-1 bg-white border border-slate-200 rounded-lg shadow-2xl max-h-96 overflow-y-auto flex flex-col">
                                            <div className="p-3 sticky top-0 bg-slate-50 border-b shadow-sm z-10 flex flex-col gap-2">
                                                <div className="relative">
                                                    <Search className="w-4 h-4 absolute left-2 top-2.5 text-slate-400" />
                                                    <input autoFocus type="text" className="w-full p-2 pl-8 border border-slate-300 rounded text-xs focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="Cari SKU atau Nama Produk..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                                                </div>
                                            </div>
                                            <div>
                                                {filteredProducts.slice(0, 50).map((p, i) => (
                                                    <div key={i} className="p-3 text-xs hover:bg-blue-50 border-b last:border-0 border-slate-100 transition-colors flex items-center gap-3">
                                                        <div className="flex-1 cursor-pointer" onClick={() => handleSelectProduct(p)}>
                                                            <div className="font-bold text-slate-800">{p.name}</div>
                                                            <div className="text-slate-500 flex justify-between mt-1">
                                                                <span>{p.sku}</span>
                                                                <span className="font-medium text-blue-600">Ecer: {formatIDR(p.eceran)}</span>
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>)}
                                    </div>
                                    <div className="mt-4 p-4 bg-blue-50 rounded border border-blue-100">
                                        <label className="block text-xs font-bold text-blue-800 mb-1">Harga Tayang Kita (Edit)</label>
                                        <input type="text" inputMode="numeric" className="w-full p-2 text-lg font-bold text-blue-700 border border-blue-300 rounded" value={formatInput(compForm.ownPrice)} onChange={e => setCompForm({...compForm, ownPrice: parseInput(e.target.value)})} placeholder={String(t1Result.sellingPrice)} />
                                    </div>
                                </Card>
                         </div>
                         <div className="lg:col-span-2 space-y-6">
                             <Card className="p-5 border-t-4 border-t-red-500">
                                 <div className="flex justify-between mb-4"><h3 className="font-bold flex items-center text-slate-800"><Eye className="w-5 h-5 mr-2 text-red-600"/> Form Kompetitor</h3><button onClick={addToCompetitorCart} disabled={!selectedSku || !compForm.compAName} className="bg-red-600 text-white text-xs font-bold py-2 px-4 rounded hover:bg-red-700">+ Tambah Banding</button></div>
                                 <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                     <div className="p-3 bg-slate-50 rounded border">
                                         <h4 className="font-bold text-slate-600 mb-2 border-b pb-1">Kompetitor A (Utama)</h4>
                                         <div className="space-y-2">
                                             <input list="competitors-list" className="w-full p-2 border rounded text-xs" placeholder="Nama Toko" value={compForm.compAName} name="compAName" onChange={handleCompFormChange} />
                                             <input type="text" inputMode="numeric" className="w-full p-2 border rounded text-xs" placeholder="Harga Tayang" value={formatInput(compForm.compAPrice)} name="compAPrice" onChange={handleCompFormChange} />
                                             <input type="text" className="w-full p-2 border rounded text-xs" placeholder="Link Produk" value={compForm.compALink} name="compALink" onChange={handleCompFormChange} />
                                         </div>
                                     </div>
                                     <div className="p-3 bg-slate-50 rounded border border-dashed">
                                         <h4 className="font-bold text-slate-500 mb-2 border-b pb-1">Kompetitor B (Opsional)</h4>
                                         <div className="space-y-2">
                                             <input list="competitors-list" className="w-full p-2 border rounded text-xs" placeholder="Nama Toko" value={compForm.compBName} name="compBName" onChange={handleCompFormChange} />
                                             <input type="text" inputMode="numeric" className="w-full p-2 border rounded text-xs" placeholder="Harga Tayang" value={formatInput(compForm.compBPrice)} name="compBPrice" onChange={handleCompFormChange} />
                                             <input type="text" className="w-full p-2 border rounded text-xs" placeholder="Link Produk" value={compForm.compBLink} name="compBLink" onChange={handleCompFormChange} />
                                         </div>
                                     </div>
                                 </div>
                             </Card>
                             <Card className="p-0 overflow-hidden">
                                 <div className="p-3 bg-slate-50 border-b flex justify-between items-center"><h4 className="font-bold text-sm">Daftar Banding ({competitorCart.length})</h4>
                                    {competitorCart.length > 0 && isAdmin && <button onClick={() => handleSendSubmission('competitor')} disabled={isSending} className="bg-orange-600 text-white text-[10px] font-bold px-3 py-1.5 rounded hover:bg-orange-700">{isSending ? '...' : 'Kirim'}</button>}
                                 </div>
                                 <div className="overflow-x-auto">
                                    <table className="w-full text-xs text-left">
                                        <thead className="bg-slate-100 font-bold text-slate-600"><tr><th className="p-2">Produk</th><th className="p-2 text-right">Kita</th><th className="p-2">Komp A</th><th className="p-2 text-right">Harga A</th><th className="p-2">Komp B</th><th className="p-2 text-right">Harga B</th><th className="p-2 text-center">Aksi</th></tr></thead>
                                        <tbody className="divide-y">
                                            {competitorCart.map(c => (
                                                <tr key={c.id}>
                                                    <td className="p-2">{c.sku}</td><td className="p-2 text-right font-bold text-blue-600">{formatIDR(c.ownPrice)}</td>
                                                    <td className="p-2">{c.compAName}</td><td className="p-2 text-right font-bold text-red-600">{formatIDR(c.compAPrice)}</td>
                                                    <td className="p-2">{c.compBName || '-'}</td><td className="p-2 text-right text-slate-500">{c.compBPrice ? formatIDR(c.compBPrice) : '-'}</td>
                                                    <td className="p-2 text-center"><button onClick={()=>setCompetitorCart(competitorCart.filter(x=>x.id!==c.id))} className="text-red-500"><Trash2 className="w-3 h-3"/></button></td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                 </div>
                                 {competitorCart.length > 0 && isAdmin && <div className="p-3 bg-slate-50 border-t"><textarea className="w-full p-2 text-xs border rounded" placeholder="Catatan review..." value={submissionNote} onChange={e=>setSubmissionNote(e.target.value)}></textarea></div>}
                             </Card>
                         </div>
                     </div>
                 )}

                 {/* INBOX & HISTORY */}
                 {(activeView === 'inbox' || activeView === 'history') && (
                    <div className="max-w-7xl mx-auto space-y-8">
                        <div className="flex justify-between items-center pb-4 border-b border-slate-200"><h2 className="text-xl font-bold text-slate-800 flex items-center">{isServer ? <Inbox className="w-6 h-6 mr-2 text-blue-600" /> : <FileText className="w-6 h-6 mr-2 text-blue-600" />}{isServer ? 'Inbox Pengajuan' : 'Riwayat Pengajuan'}</h2><div className="flex items-center gap-3"><button onClick={handleRefreshSubmissions} className="text-xs bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 py-1.5 rounded-lg flex items-center transition-colors"><RefreshCw className={`w-3 h-3 mr-1 ${isRefreshing || isLoadingHistory ? 'animate-spin text-blue-500' : ''}`} /> {isRefreshing || isLoadingHistory ? 'Memuat...' : 'Refresh'}</button>{isServer && (<button onClick={() => downloadHistoryDB(submissions)} className="text-xs bg-green-600 hover:bg-green-700 text-white px-3 py-1.5 rounded-lg flex items-center transition-colors"><Download className="w-3 h-3 mr-1" /> Download DB</button>)}</div></div>
                        
                        {/* Server Quick Calculator */}
                        {isServer && activeView === 'inbox' && (
                            <ServerQuickCalculator fees={fees} />
                        )}

                        {/* PENDING SECTION */}
                        <div>
                            <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 gap-4">
                                <h3 className="text-lg font-bold text-slate-700 flex items-center"><Clock className="w-5 h-5 mr-2 text-yellow-500" /> Menunggu Konfirmasi</h3>
                                <div className="flex items-center gap-2 bg-slate-100 p-1 rounded-lg">
                                    <button onClick={() => {setPendingFilter('all'); setPendingPage(1);}} className={`px-3 py-1 text-xs rounded-md transition-all ${pendingFilter === 'all' ? 'bg-white shadow text-slate-800 font-bold' : 'text-slate-500 hover:text-slate-700'}`}>Semua</button>
                                    <button onClick={() => {setPendingFilter('pending'); setPendingPage(1);}} className={`px-3 py-1 text-xs rounded-md transition-all ${pendingFilter === 'pending' ? 'bg-white shadow text-slate-800 font-bold' : 'text-slate-500 hover:text-slate-700'}`}>Baru</button>
                                    <button onClick={() => {setPendingFilter('revision'); setPendingPage(1);}} className={`px-3 py-1 text-xs rounded-md transition-all ${pendingFilter === 'revision' ? 'bg-white shadow text-slate-800 font-bold' : 'text-slate-500 hover:text-slate-700'}`}>Revisi</button>
                                </div>
                            </div>
                            <div className="space-y-6">
                                {paginatedPending.length === 0 ? <p className="text-sm text-slate-400 italic">Tidak ada data.</p> : 
                                    pendingSenders.map(sender => (
                                        <div key={sender} className="border border-slate-200 rounded-xl overflow-hidden shadow-sm">
                                            <div className="bg-slate-100 px-4 py-3 border-b border-slate-200 flex justify-between items-center">
                                                <div className="flex items-center">
                                                    <div className="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold text-xs uppercase mr-3">{sender.slice(0, 2)}</div>
                                                    <span className="font-bold text-slate-700 uppercase tracking-wide text-sm">{sender}</span>
                                                </div>
                                                <span className="bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded text-[10px] font-bold border border-yellow-200">{groupedPending[sender].length} Item</span>
                                            </div>
                                            <div className="p-3 space-y-3 bg-slate-50/30">
                                                {groupedPending[sender].map(sub => (
                                                    <SubmissionCard key={sub.id} sub={sub} currentUser={currentUser} isServer={isServer} isAdmin={isAdmin} canSeeHPP={canSeeHPP} serverDrafts={serverDrafts} expandedSubmissionId={expandedSubmissionId} onToggle={handleToggleExpand} onDraftChange={handleServerDraftChange} onUpdateStatus={handleUpdateStatus} onEdit={handleEditSubmission} formatIDR={formatIDR} formatDateTime={formatDateTime} productList={productList} />
                                                ))}
                                            </div>
                                        </div>
                                    ))
                                }
                            </div>
                             {/* Pagination Pending */}
                            {totalPendingPages > 1 && (
                                <div className="flex justify-center items-center mt-4 gap-4">
                                    <button onClick={() => setPendingPage(p => Math.max(1, p - 1))} disabled={pendingPage === 1} className="p-1 rounded hover:bg-slate-100 disabled:opacity-30"><ChevronLeft className="w-5 h-5"/></button>
                                    <span className="text-xs text-slate-500 font-medium">Halaman {pendingPage} dari {totalPendingPages}</span>
                                    <button onClick={() => setPendingPage(p => Math.min(totalPendingPages, p + 1))} disabled={pendingPage === totalPendingPages} className="p-1 rounded hover:bg-slate-100 disabled:opacity-30"><ChevronRight className="w-5 h-5"/></button>
                                </div>
                            )}
                        </div>

                        {/* COMPLETED SECTION */}
                        <div className="pt-6 border-t border-dashed border-slate-300">
                            <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 gap-4">
                                <h3 className="text-lg font-bold text-slate-700 flex items-center"><FileSpreadsheet className="w-5 h-5 mr-2 text-green-600" /> Riwayat Selesai</h3>
                                <div className="flex items-center gap-2 bg-slate-100 p-1 rounded-lg">
                                    <button onClick={() => {setCompletedFilter('all'); setCompletedPage(1);}} className={`px-3 py-1 text-xs rounded-md transition-all ${completedFilter === 'all' ? 'bg-white shadow text-slate-800 font-bold' : 'text-slate-500 hover:text-slate-700'}`}>Semua</button>
                                    <button onClick={() => {setCompletedFilter('approved'); setCompletedPage(1);}} className={`px-3 py-1 text-xs rounded-md transition-all ${completedFilter === 'approved' ? 'bg-white shadow text-green-700 font-bold' : 'text-slate-500 hover:text-slate-700'}`}>Disetujui</button>
                                    <button onClick={() => {setCompletedFilter('rejected'); setCompletedPage(1);}} className={`px-3 py-1 text-xs rounded-md transition-all ${completedFilter === 'rejected' ? 'bg-white shadow text-red-700 font-bold' : 'text-slate-500 hover:text-slate-700'}`}>Ditolak</button>
                                </div>
                            </div>
                            
                            <div className="space-y-6">
                                {paginatedCompleted.length === 0 ? <p className="text-sm text-slate-400 italic">Belum ada riwayat.</p> : 
                                completedSenders.map(sender => (
                                    <div key={sender} className="border border-slate-200 rounded-xl overflow-hidden shadow-sm opacity-90 hover:opacity-100 transition-opacity">
                                        <div className="bg-slate-50 px-4 py-2 border-b border-slate-200 flex justify-between items-center">
                                            <div className="flex items-center">
                                                <User className="w-4 h-4 text-slate-400 mr-2"/>
                                                <span className="font-semibold text-slate-600 uppercase text-xs">{sender}</span>
                                            </div>
                                            <span className="text-[10px] text-slate-400">{groupedCompleted[sender].length} Item</span>
                                        </div>
                                        <div className="p-2 space-y-2">
                                            {groupedCompleted[sender].map(sub => (
                                                <SubmissionCard key={sub.id} sub={sub} currentUser={currentUser} isServer={isServer} isAdmin={isAdmin} canSeeHPP={canSeeHPP} serverDrafts={serverDrafts} expandedSubmissionId={expandedSubmissionId} onToggle={handleToggleExpand} onDraftChange={handleServerDraftChange} onUpdateStatus={handleUpdateStatus} onEdit={handleEditSubmission} formatIDR={formatIDR} formatDateTime={formatDateTime} productList={productList} />
                                            ))}
                                        </div>
                                    </div>
                                ))
                                }
                            </div>

                            {/* Pagination Completed */}
                            {totalCompletedPages > 1 && (
                                <div className="flex justify-center items-center mt-4 gap-4">
                                    <button onClick={() => setCompletedPage(p => Math.max(1, p - 1))} disabled={completedPage === 1} className="p-1 rounded hover:bg-slate-100 disabled:opacity-30"><ChevronLeft className="w-5 h-5"/></button>
                                    <span className="text-xs text-slate-500 font-medium">Halaman {completedPage} dari {totalCompletedPages}</span>
                                    <button onClick={() => setCompletedPage(p => Math.min(totalCompletedPages, p + 1))} disabled={completedPage === totalCompletedPages} className="p-1 rounded hover:bg-slate-100 disabled:opacity-30"><ChevronRight className="w-5 h-5"/></button>
                                </div>
                            )}
                        </div>
                    </div>
                 )}
              </div>
              
              {/* FAB Kalkulator Dasar */}
              {isLoggedIn && (
                  <div className="fixed bottom-6 right-6 flex flex-col items-end z-[998]">
                      {showBasicCalc && <BasicCalculator onClose={() => setShowBasicCalc(false)} />}
                      <button 
                          onClick={() => setShowBasicCalc(!showBasicCalc)}
                          className={`p-4 rounded-full shadow-2xl transition-transform hover:scale-105 flex items-center justify-center ${showBasicCalc ? 'bg-slate-800 text-white' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}
                          title="Kalkulator Tambahan"
                      >
                          {showBasicCalc ? <X className="w-6 h-6" /> : <CalcIcon className="w-6 h-6" />}
                      </button>
                  </div>
              )}
            </div>
          );
        }

        // --- Render the Application ---
        const rootElement = document.getElementById('root');
        const root = createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
